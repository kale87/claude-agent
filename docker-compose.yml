services:
  claude-agent:
    build: .
    container_name: claude-agent
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      # Mount the repo you want to commit/push from.
      # Change the left side to any folder on your machine.
      # Example: - /Users/you/myproject:/workspace
      - ${GIT_WORKDIR:-./workspace}:/workspace
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
