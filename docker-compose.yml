version: '3.8'

services:
  claude-agent:
    build: .
    container_name: claude-agent
    ports:
      - '3000:3000'
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000']
      interval: 30s
      timeout: 5s
      retries: 3
