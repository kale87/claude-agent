<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #fff; }
    #clearBtn {
      background: transparent;
      border: 1px solid #333;
      color: #888;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #clearBtn:hover { border-color: #555; color: #ccc; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: #2a2a2a;
      border-bottom-right-radius: 4px;
      color: #fff;
    }
    .message.assistant {
      align-self: flex-start;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }
    .message.thinking {
      align-self: flex-start;
      color: #555;
      font-style: italic;
      font-size: 13px;
      padding: 4px 0;
      background: transparent;
    }
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #333;
    }
    .empty-state .icon { font-size: 40px; }
    .empty-state p { font-size: 14px; }
    #inputArea {
      padding: 16px 24px;
      border-top: 1px solid #1e1e1e;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 160px;
      overflow-y: auto;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    #input:focus { border-color: #444; }
    #input::placeholder { color: #444; }
    #sendBtn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 10px;
      width: 40px;
      height: 40px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    #sendBtn:disabled { opacity: 0.3; cursor: not-allowed; }
    #sendBtn:hover:not(:disabled) { opacity: 0.85; }
  </style>
</head>
<body>
  <header>
    <h1>🚀 Claude Agent</h1>
    <button id="clearBtn">Clear chat</button>
  </header>
  <div id="messages">
    <div class="empty-state" id="emptyState">
      <span class="icon">💬</span>
      <p>Start a conversation</p>
    </div>
  </div>
  <div id="inputArea">
    <textarea id="input" rows="1" placeholder="Message Claude..."></textarea>
    <button id="sendBtn">↑</button>
  </div>
  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const sessionId = 'ui-' + Date.now();

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(role, text) {
      const empty = document.getElementById('emptyState');
      if (empty) empty.remove();
      const el = document.createElement('div');
      el.className = 'message ' + role;
      el.textContent = text;
      messagesEl.appendChild(el);
      scrollToBottom();
      return el;
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message) return;
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      addMessage('user', message);
      const thinking = addMessage('thinking', 'Claude is thinking...');
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, sessionId }),
        });
        const data = await res.json();
        thinking.remove();
        addMessage('assistant', data.error ? 'Error: ' + data.error : data.reply);
      } catch (err) {
        thinking.remove();
        addMessage('assistant', 'Could not reach the agent. Is it running?');
      }
      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = inputEl.scrollHeight + 'px';
    });
    clearBtn.addEventListener('click', async () => {
      await fetch('/clear', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId }),
      });
      messagesEl.innerHTML = '<div class="empty-state" id="emptyState"><span class="icon">💬</span><p>Start a conversation</p></div>';
    });
  </script>
</body>
</html>
