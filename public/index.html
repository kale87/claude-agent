<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kal-AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#07070e;--bg2:#0d0d1a;--bg3:#12122a;
--s1:rgba(255,255,255,.04);--s2:rgba(255,255,255,.07);--s3:rgba(255,255,255,.11);
--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);--b3:rgba(255,255,255,.25);
--tx:#ddddf0;--muted:#5a5a90;--dim:#252540;
--ac:#6366f1;--ac2:#8b5cf6;
--grad:linear-gradient(135deg,#6366f1,#8b5cf6);
--grad2:linear-gradient(135deg,#0f0f2a,#1a1a3a);
--ok:#4ade80;--warn:#fbbf24;--err:#f87171;
--r:14px;--r2:10px;--r3:8px;
--t:.15s ease;
--sw:240px;
--gw:340px;
}
[data-theme=light]{
--bg:#f2f2fc;--bg2:#eaeaf6;--bg3:#e2e2f0;
--s1:rgba(0,0,0,.03);--s2:rgba(0,0,0,.055);--s3:rgba(0,0,0,.09);
--b1:rgba(0,0,0,.07);--b2:rgba(0,0,0,.13);--b3:rgba(0,0,0,.22);
--tx:#111128;--muted:#5050a0;--dim:#c5c5e0;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.6;background:var(--bg);color:var(--tx);display:flex;flex-direction:column;height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}

/* ─── PIXEL OFFICE ─── */
#office{
flex-shrink:0;height:180px;background:var(--bg2);
border-bottom:1px solid var(--b1);position:relative;overflow:hidden;
}
#officeCanvas{display:block;width:100%;height:180px;image-rendering:pixelated;image-rendering:crisp-edges}
#officeOverlay{
position:absolute;bottom:0;left:0;right:0;height:40px;
background:linear-gradient(transparent,var(--bg2));
pointer-events:none;
}

/* ─── HEADER ─── */
header{
display:flex;align-items:center;gap:10px;
padding:10px 20px;
background:rgba(7,7,14,.8);backdrop-filter:blur(12px);
border-bottom:1px solid var(--b1);flex-shrink:0;
}
.logo{font-size:16px;font-weight:800;letter-spacing:-.3px;
background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:11px;color:var(--muted);margin-left:2px}
.hdr-mid{flex:1;display:flex;align-items:center;gap:8px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px var(--ok)}
.model-pill{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--s2);border:1px solid var(--b1);color:var(--muted)}
.hdr-right{display:flex;gap:4px}

/* ─── AGENT BAR ─── */
#agentBar{
display:flex;gap:6px;padding:8px 20px;
background:var(--bg3);border-bottom:1px solid var(--b1);
flex-shrink:0;overflow-x:auto;
}
.ap{
display:flex;align-items:center;gap:6px;
padding:5px 12px;border-radius:20px;
border:1px solid var(--b1);background:var(--s1);
font-size:12px;font-weight:500;white-space:nowrap;
transition:all var(--t);cursor:default;
}
.ap.idle{opacity:.45}
.ap.thinking,.ap.working,.ap.synthesizing{
opacity:1;border-color:var(--pc);
box-shadow:0 0 14px -3px var(--pc),inset 0 0 20px -8px var(--pc);
}
.ap.done{opacity:.75}
.ap-dot{width:7px;height:7px;border-radius:50%;background:var(--pc);flex-shrink:0;transition:transform .2s}
.ap.thinking .ap-dot,.ap.working .ap-dot,.ap.synthesizing .ap-dot{animation:apulse .7s ease-in-out infinite alternate}
@keyframes apulse{to{transform:scale(1.7);opacity:.5}}
.ap-status{font-size:10.5px;color:var(--muted)}

/* ─── WORKSPACE ─── */
#workspace{flex:1;display:flex;overflow:hidden;min-height:0}

/* ─── SIDEBAR ─── */
#sidebar{
width:var(--sw);flex-shrink:0;
display:flex;flex-direction:column;
border-right:1px solid var(--b1);background:var(--s1);
overflow:hidden;transition:width var(--t),opacity var(--t);
}
#sidebar.off{width:0;opacity:0;pointer-events:none}
.sb-head{padding:12px 10px 8px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.new-btn{
display:flex;align-items:center;gap:8px;width:100%;
padding:9px 14px;background:var(--grad);border:none;border-radius:var(--r2);
color:#fff;font-size:13px;font-weight:600;cursor:pointer;
transition:opacity var(--t),transform var(--t);
}
.new-btn:hover{opacity:.85;transform:translateY(-1px)}
.sb-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:0 5px}
#sessList{flex:1;overflow-y:auto;padding:0 6px 12px}
.si{padding:8px 9px;border-radius:var(--r3);cursor:pointer;transition:background var(--t);margin-bottom:2px;overflow:hidden}
.si:hover{background:var(--s2)}
.si.on{background:rgba(99,102,241,.16)}
.si-title{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.si-time{font-size:11px;color:var(--muted);margin-top:2px}

/* ─── CHAT ─── */
#chat{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#msgs{flex:1;overflow-y:auto;padding:32px 28px;display:flex;flex-direction:column;gap:22px}

/* empty */
#empty{
flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:16px;padding:40px;text-align:center;animation:fadeUp .3s ease;
}
.e-icon{
width:64px;height:64px;border-radius:20px;background:var(--grad);
display:flex;align-items:center;justify-content:center;
font-size:28px;box-shadow:0 8px 32px rgba(99,102,241,.3);
}
.e-title{font-size:24px;font-weight:800;letter-spacing:-.3px}
.e-sub{font-size:14px;color:var(--muted)}
.e-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px}
.ec{
padding:8px 16px;border-radius:20px;
background:var(--s1);border:1px solid var(--b1);
color:var(--tx);font-size:13px;cursor:pointer;transition:all var(--t);
}
.ec:hover{border-color:var(--ac);color:var(--ac);background:rgba(99,102,241,.08)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* bubbles */
.mr{display:flex;flex-direction:column;gap:5px;animation:fadeUp .2s ease}
.mr.u{align-items:flex-end}
.mr.a{align-items:flex-start}
.al{font-size:11px;color:var(--muted);padding:0 4px;display:flex;align-items:center;gap:5px}
.al-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.bub{
max-width:min(80%,740px);padding:13px 17px;
border-radius:var(--r);font-size:14px;line-height:1.72;word-break:break-word;
}
.mr.u .bub{
background:var(--grad);color:#fff;border-bottom-right-radius:4px;
box-shadow:0 4px 24px rgba(99,102,241,.28);
}
.mr.a .bub{
background:var(--s2);border:1px solid var(--b1);
border-bottom-left-radius:4px;
}
.macts{display:flex;gap:4px;opacity:0;transition:opacity var(--t)}
.mr:hover .macts{opacity:1}
.abtn{
display:flex;align-items:center;gap:4px;padding:3px 9px;
background:var(--s1);border:1px solid var(--b1);
border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer;transition:all var(--t);
}
.abtn:hover{color:var(--tx);border-color:var(--b2)}

/* markdown */
.bub p{margin-bottom:.6em}
.bub p:last-child{margin-bottom:0}
.bub h1,.bub h2,.bub h3{font-weight:700;margin:.9em 0 .35em;line-height:1.3}
.bub h1{font-size:1.22em}.bub h2{font-size:1.1em}.bub h3{font-size:1em}
.bub ul,.bub ol{padding-left:1.5em;margin-bottom:.6em}
.bub li{margin-bottom:.2em}
.bub a{color:var(--ac);text-decoration:underline}
.bub strong{font-weight:700}.bub em{font-style:italic}
.bub blockquote{border-left:3px solid var(--ac);padding-left:12px;color:var(--muted);margin:.5em 0}
.bub table{border-collapse:collapse;width:100%;margin-bottom:.6em;font-size:13px}
.bub th,.bub td{border:1px solid var(--b1);padding:5px 10px;text-align:left}
.bub th{background:var(--s2);font-weight:600}
.bub :not(pre)>code{background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:1px 5px;font-family:'JetBrains Mono',monospace;font-size:.85em}
.cb{background:#0d1117;border:1px solid var(--b1);border-radius:var(--r2);overflow:hidden;margin:.5em 0;font-size:13px}
.ch{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--b1)}
.cl{font-size:11px;color:var(--muted);font-family:monospace}
.cc{font-size:11px;padding:2px 8px;background:var(--s2);border:1px solid var(--b1);border-radius:4px;color:var(--muted);cursor:pointer;transition:all var(--t)}
.cc:hover{color:var(--tx)}
.cb pre{margin:0;padding:14px 16px;overflow-x:auto}
.cb pre code{background:none!important;border:none!important;padding:0!important}
.cur{display:inline-block;width:2px;height:1em;background:var(--ac);margin-left:2px;vertical-align:text-bottom;border-radius:1px;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* attach */
#abar{padding:6px 28px;border-top:1px solid var(--b1);background:var(--s1);display:flex;flex-wrap:wrap;gap:6px}
#abar.off{display:none}
.ach{display:flex;align-items:center;gap:5px;padding:3px 10px;background:var(--s2);border:1px solid var(--b1);border-radius:20px;font-size:12px}
.arm{display:flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--b2);border:none;color:var(--muted);cursor:pointer;font-size:10px;transition:all var(--t)}
.arm:hover{background:var(--err);color:#fff}

/* input */
#iarea{padding:12px 28px 16px;border-top:1px solid var(--b1);background:var(--bg2);flex-shrink:0}
.ibox{display:flex;flex-direction:column;background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);transition:border-color var(--t),box-shadow var(--t)}
.ibox:focus-within{border-color:rgba(99,102,241,.45);box-shadow:0 0 0 3px rgba(99,102,241,.07)}
#inp{background:transparent;border:none;outline:none;color:var(--tx);font-family:inherit;font-size:14px;line-height:1.65;padding:13px 16px;resize:none;max-height:180px;overflow-y:auto}
#inp::placeholder{color:var(--muted)}
.itbar{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-top:1px solid var(--b1)}
.itools{display:flex;gap:2px}
.hint{font-size:11px;color:var(--dim);text-align:center;margin-top:6px}

/* icon btn */
.ib{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:var(--r3);border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:all var(--t);flex-shrink:0}
.ib:hover{background:var(--s2);border-color:var(--b1);color:var(--tx)}
.ib.on{background:rgba(99,102,241,.14);border-color:rgba(99,102,241,.3);color:var(--ac)}
.ib.del:hover{color:var(--err);border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.07)}

/* send */
.sbtn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:var(--r2);border:none;background:var(--grad);color:#fff;cursor:pointer;flex-shrink:0;transition:opacity var(--t),transform var(--t);box-shadow:0 4px 16px rgba(99,102,241,.3)}
.sbtn:hover:not(:disabled){opacity:.85;transform:translateY(-1px) scale(1.04)}
.sbtn:disabled{opacity:.2;cursor:not-allowed;transform:none;box-shadow:none}

/* ─── GITHUB PANEL ─── */
#ghp{
width:var(--gw);flex-shrink:0;
display:flex;flex-direction:column;
border-left:1px solid var(--b1);background:var(--s1);
overflow:hidden;transition:width var(--t),opacity var(--t);
}
#ghp.off{width:0;opacity:0;pointer-events:none}
.ph{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--b1);flex-shrink:0}
.pt{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.pb{flex:1;overflow-y:auto;padding:14px}
.gs{margin-bottom:16px}
.gsl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.gri{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r3);cursor:pointer;font-size:12.5px;transition:background var(--t)}
.gri:hover{background:var(--s2)}
.gri.sel{background:rgba(99,102,241,.14);color:var(--ac)}
.gfi{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'JetBrains Mono',monospace;transition:background var(--t)}
.gfi:hover{background:var(--s2)}
.gb{width:100%;padding:8px 12px;border-radius:var(--r3);border:1px solid var(--b1);background:var(--s2);color:var(--tx);font-size:12.5px;font-weight:600;cursor:pointer;transition:all var(--t);margin-bottom:6px}
.gb:hover{border-color:var(--b2);background:var(--s3)}
.gb.p{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 3px 12px rgba(99,102,241,.25)}
.gb.p:hover{opacity:.88}
.gb:disabled{opacity:.4;cursor:not-allowed}
.gi{width:100%;background:var(--bg);border:1px solid var(--b1);border-radius:var(--r3);padding:7px 11px;color:var(--tx);font-family:inherit;font-size:12.5px;outline:none;transition:border-color var(--t);margin-bottom:6px}
.gi:focus{border-color:rgba(99,102,241,.45)}
.gi::placeholder{color:var(--muted)}
.gta{width:100%;background:var(--bg);border:1px solid var(--b1);border-radius:var(--r3);padding:7px 11px;color:var(--tx);font-family:inherit;font-size:12.5px;outline:none;resize:vertical;min-height:64px;transition:border-color var(--t);margin-bottom:6px}
.gta:focus{border-color:rgba(99,102,241,.45)}
.go{background:#0d1117;border:1px solid var(--b1);border-radius:var(--r3);padding:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);white-space:pre-wrap;word-break:break-all;max-height:110px;overflow-y:auto;margin-top:6px}
.go.ok{border-color:rgba(74,222,128,.3);color:var(--ok)}
.go.err{border-color:rgba(248,113,113,.3);color:var(--err)}
.pri{padding:8px 10px;border-radius:var(--r3);background:var(--s2);border:1px solid var(--b1);margin-bottom:4px;font-size:12.5px;cursor:pointer;transition:background var(--t)}
.pri:hover{background:rgba(99,102,241,.1)}
.pri-t{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pri-m{font-size:11px;color:var(--muted);margin-top:2px}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r2);padding:9px 20px;font-size:13px;font-weight:500;opacity:0;transition:all .2s;pointer-events:none;z-index:9999;white-space:nowrap;backdrop-filter:blur(8px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:rgba(74,222,128,.4);color:var(--ok)}
#toast.err{border-color:rgba(248,113,113,.4);color:var(--err)}

/* ollama warning */
#ollamaWarn{display:none;padding:10px 20px;background:rgba(251,191,36,.08);border-bottom:1px solid rgba(251,191,36,.2);font-size:13px;color:var(--warn);flex-shrink:0;align-items:center;gap:8px}
#ollamaWarn.show{display:flex}
</style>
</head>
<body>

<div id="office"><canvas id="officeCanvas"></canvas><div id="officeOverlay"></div></div>

<header>
  <button class="ib" id="sbBtn" title="Toggle sidebar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="hdr-mid">
    <span class="logo">Kal-AI</span>
    <div class="status-dot" id="statusDot" title="Ollama connected"></div>
    <span class="model-pill" id="modelPill">loading…</span>
  </div>
  <div class="hdr-right">
    <button class="ib" id="ghBtn" title="GitHub">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.11.82-.26.82-.57v-2c-3.34.72-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.14-.3-.54-1.52.1-3.18 0 0 1-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.28-1.55 3.29-1.23 3.29-1.23.65 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.69.83.57C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
    </button>
    <button class="ib" id="themeBtn" title="Toggle theme">
      <svg id="themeIco" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<div id="ollamaWarn">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <span id="ollamaWarnMsg">Ollama is not running. Start it with: <code>ollama serve</code></span>
</div>

<div id="agentBar"></div>

<div id="workspace">
  <aside id="sidebar">
    <div class="sb-head">
      <button class="new-btn" id="newBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New chat
      </button>
      <div class="sb-lbl">History</div>
    </div>
    <div id="sessList"></div>
  </aside>

  <div id="chat">
    <div id="msgs">
      <div id="empty">
        <div class="e-icon">✦</div>
        <div class="e-title">Kal-AI</div>
        <div class="e-sub">Your local multi-agent team is ready</div>
        <div class="e-chips">
          <button class="ec" data-p="Review this code and suggest improvements:\n">Review code</button>
          <button class="ec" data-p="Research and summarize: ">Research topic</button>
          <button class="ec" data-p="Write documentation for: ">Write docs</button>
          <button class="ec" data-p="Help me debug this issue:\n">Debug issue</button>
          <button class="ec" data-p="Create a step by step plan to: ">Make a plan</button>
          <button class="ec" data-p="Write a commit message for these changes:\n">Commit msg</button>
        </div>
      </div>
    </div>
    <div id="abar" class="off"></div>
    <div id="iarea">
      <input type="file" id="fi" accept=".js,.ts,.jsx,.tsx,.py,.go,.rs,.java,.cpp,.c,.cs,.html,.css,.json,.yaml,.yml,.md,.txt,.sh,.sql" hidden multiple/>
      <div class="ibox">
        <textarea id="inp" rows="1" placeholder="Message your agents…"></textarea>
        <div class="itbar">
          <div class="itools">
            <button class="ib" id="fileBtn" title="Attach file">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button class="ib del" id="clearBtn" title="Clear chat">

<script>
'use strict';

// ── CONFIG ──────────────────────────────────────────────────────
const AGENTS={
  manager:   {name:'Manager',   emoji:'🎯',color:'#6366f1'},
  coder:     {name:'Coder',     emoji:'💻',color:'#10b981'},
  researcher:{name:'Researcher',emoji:'🔍',color:'#f59e0b'},
  writer:    {name:'Writer',    emoji:'✍️', color:'#ec4899'},
};
const AS=Object.fromEntries(Object.keys(AGENTS).map(k=>[k,'idle']));

// ── PIXEL OFFICE ────────────────────────────────────────────────
(function(){
  const cv=document.getElementById('officeCanvas');
  const cx=cv.getContext('2d');
  let W,H,frame=0;

  function resize(){
    W=cv.parentElement.offsetWidth;
    H=180;
    cv.width=W;
    cv.height=H;
  }
  resize();
  window.addEventListener('resize',resize);

  const SC=4; // pixel scale
  const PW=Math.floor(W/SC);
  const PH=Math.floor(H/SC);

  function px(x,y,w,h,c){cx.fillStyle=c;cx.fillRect(x*SC,y*SC,w*SC,h*SC)}

  function shade(hex,a){
    let r=parseInt(hex.slice(1,3),16)+a,g=parseInt(hex.slice(3,5),16)+a,b=parseInt(hex.slice(5,7),16)+a;
    return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
  }

  const deskX=Math.floor(PW*0.18),deskY=Math.floor(PH*0.38);
  const deskW=Math.floor(PW*0.64),deskH=Math.floor(PH*0.35);

  // 4 seats around desk
  const seats=[
    {x:deskX+3,           y:deskY-10, key:'manager'},
    {x:deskX+deskW/2+2,  y:deskY-10, key:'coder'},
    {x:deskX+3,           y:deskY+deskH+2, key:'researcher'},
    {x:deskX+deskW/2+2,  y:deskY+deskH+2, key:'writer'},
  ];

  function drawAgent(sx,sy,color,state,f){
    const dk=shade(color,-50),lt=shade(color,50);
    // chair
    px(sx,sy+8,8,1,'#1a1a35');
    px(sx,sy+5,1,4,'#1a1a35');
    px(sx+7,sy+5,1,4,'#1a1a35');
    // body
    const by=state==='working'||state==='thinking'?sy+2:sy+3;
    px(sx+2,by,4,4,color);
    // head
    px(sx+2,by-3,4,3,lt);
    // eyes — blink
    const eyeC=f%90<4?lt:'#000';
    px(sx+3,by-2,1,1,eyeC);
    px(sx+5,by-2,1,1,eyeC);
    // arms
    if(state==='working'||state==='thinking'){
      px(sx+1,by,1,2,dk);
      px(sx+6,by,1,2,dk);
    } else if(state==='done'){
      px(sx+1,by-2,1,2,dk);
      px(sx+6,by-2,1,2,dk);
    }
    // activity dots
    if(state==='thinking'||state==='working'||state==='synthesizing'){
      const df=Math.floor(f/10)%3;
      for(let i=0;i<3;i++) px(sx+2+i*2,by-6,1,1,i<=df?color:'#222');
    }
    if(state==='done') px(sx+2,by-6,4,1,'#4ade80');
  }

  function draw(){
    cx.clearRect(0,0,W,H);
    // floor
    cx.fillStyle='#0d0d1f';
    cx.fillRect(0,0,W,H);
    // floor grid
    cx.fillStyle='rgba(255,255,255,0.025)';
    for(let x=0;x<PW;x+=6) cx.fillRect(x*SC,0,SC,H);
    for(let y=0;y<PH;y+=6) cx.fillRect(0,y*SC,W,SC);

    // desk shadow
    cx.fillStyle='rgba(0,0,0,0.4)';
    cx.fillRect((deskX+1)*SC,(deskY+1)*SC,deskW*SC,deskH*SC);
    // desk surface
    px(deskX,deskY,deskW,deskH,'#1e1e42');
    // desk edge
    px(deskX,deskY,deskW,1,'#2e2e5a');
    px(deskX,deskY,1,deskH,'#2e2e5a');
    px(deskX+deskW-1,deskY,1,deskH,'#2e2e5a');
    px(deskX,deskY+deskH-1,deskW,1,'#141428');

    // monitors
    const mons=[
      {x:deskX+4,y:deskY+2},
      {x:deskX+deskW/2+3,y:deskY+2},
    ];
    mons.forEach((m,i)=>{
      const active=(i===0&&(AS.manager!=='idle'||AS.researcher!=='idle'))||(i===1&&(AS.coder!=='idle'||AS.writer!=='idle'));
      px(m.x,m.y,16,12,'#0a0a20');
      px(m.x+1,m.y+1,14,10,active?'#0a1a0a':'#0f0f22');
      if(active){
        cx.fillStyle='rgba(0,255,68,0.35)';
        for(let r=0;r<4;r++){
          const lw=Math.floor((frame*0.4+r*9)%12)+2;
          cx.fillRect((m.x+2)*SC,(m.y+2+r*2)*SC,lw*SC,SC);
        }
      }
      px(m.x+7,m.y+12,2,2,'#1e1e42');
      px(m.x+5,m.y+14,6,1,'#1e1e42');
    });

    // desk items
    px(deskX+deskW-6,deskY+3,3,5,'#7B5B14'); // coffee
    px(deskX+deskW-5,deskY+2,1,1,'#3a2808');
    px(deskX+deskW-5,deskY+3,1,1,'rgba(200,120,0,0.6)');
    // papers
    px(deskX+deskW-14,deskY+5,8,5,'#d0d0f0');
    px(deskX+deskW-13,deskY+4,8,5,'#b8b8e0');
    // plant
    px(deskX+2,deskY+deskH-6,3,5,'#2d1a0a');
    px(deskX+1,deskY+deskH-10,5,5,'#1a4020');
    px(deskX+2,deskY+deskH-12,3,3,'#1f5028');
    px(deskX+3,deskY+deskH-13,1,2,'#2a6035');

    // agents
    seats.forEach(s=>{
      drawAgent(s.x,s.y,AGENTS[s.key].color,AS[s.key],frame);
      cx.fillStyle='rgba(255,255,255,0.4)';
      cx.font=`${SC*2.5}px monospace`;
      cx.fillText(AGENTS[s.key].name.slice(0,3),s.x*SC,(s.y+12)*SC);
    });

    // branding
    cx.fillStyle='rgba(99,102,241,0.25)';
    cx.font=`${SC*3}px monospace`;
    cx.fillText('KAL-AI',( PW-14)*SC,(PH-2)*SC);

    frame++;
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── MARKDOWN ────────────────────────────────────────────────────
(()=>{

let tt;

// ── THEME ────────────────────────────────────────────────────────
const MOON='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
const SUN='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('themeIco').innerHTML=t==='dark'?MOON:SUN;}
document.getElementById('themeBtn').addEventListener('click',()=>{
  const n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  localStorage.setItem('theme',n);applyTheme(n);
});
applyTheme(localStorage.getItem('theme')||'dark');

// ── AGENT BAR ────────────────────────────────────────────────────
function renderAgentBar(){
  document.getElementById('agentBar').innerHTML=Object.entries(AGENTS).map(([k,a])=>{
    const s=AS[k];
    const lbl={idle:'Idle',thinking:'Thinking…',working:'Working…',synthesizing:'Synthesizing…',done:'Done ✓'}[s]||s;
    return `<div class="ap ${s}" style="--pc:${a.color}"><div class="ap-dot"></div><span>${a.emoji} ${a.name}</span><span class="ap-status">${lbl}</span></div>`;
  }).join('');
}
renderAgentBar();
function setSt(k,s){AS[k]=s;renderAgentBar();}

// ── STATUS CHECK ─────────────────────────────────────────────────
function checkOllama(){
  fetch('/ollama/status').then(r=>r.json()).then(d=>{
    const dot=document.getElementById('statusDot');
    const warn=document.getElementById('ollamaWarn');
    const pill=document.getElementById('modelPill');
    if(d.running){
      dot.style.background='var(--ok)';
      dot.style.boxShadow='0 0 6px var(--ok)';
      pill.textContent=d.currentModel;
      warn.classList.remove('show');
      if(!d.hasModel){
        warn.classList.add('show');
        document.getElementById('ollamaWarnMsg').textContent=`Model "${d.currentModel}" not found. Run: ollama pull ${d.currentModel}`;
      }
    } else {
      dot.style.background='var(--err)';
      dot.style.boxShadow='0 0 6px var(--err)';
      pill.textContent='offline';
      warn.classList.add('show');
    }
  }).catch(()=>{});
}
checkOllama();

// ── STATE ────────────────────────────────────────────────────────
let sid='ui-'+Date.now(),atts=[],curStreams={};
const msgsEl=document.getElementById('msgs');
const inpEl=document.getElementById('inp');
const sndBtn=document.getElementById('sendBtn');

// ── SIDEBAR ──────────────────────────────────────────────────────
document.getElementById('sbBtn').addEventListener('click',()=>
  document.getElementById('sidebar').classList.toggle('off'));

function loadSess(){
  fetch('/sessions').then(r=>r.json()).then(list=>{
    const el=document.getElementById('sessList');
    if(!list.length){el.innerHTML='<div style="font-size:12px;color:var(--muted);padding:8px 10px">No history yet</div>';return;}
    el.innerHTML=list.map(s=>`<div class="si${s.id===sid?' on':''}" data-id="${esc(s.id)}"><div class="si-title">${esc(s.title||'Untitled')}</div><div class="si-time">${rt(s.lastAccessed)}</div></div>`).join('');
    el.querySelectorAll('.si').forEach(e=>e.addEventListener('click',()=>swSess(e.dataset.id)));
  }).catch(()=>{});
}

function swSess(id){
  if(id===sid) return;
  sid=id;
  document.querySelectorAll('.si').forEach(e=>e.classList.toggle('on',e.dataset.id===id));
  msgsEl.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:40px">Loading…</div>';
  fetch(`/sessions/${encodeURIComponent(id)}/messages`).then(r=>r.json()).then(msgs=>{
    msgsEl.innerHTML='';
    if(!msgs.length){showEmpty();return;}
    msgs.forEach(m=>{ if(m.role==='user') addU(m.content); else addA(m.content,m.agent||'manager'); });
    msgsEl.scrollTop=msgsEl.scrollHeight;
  });
}

document.getElementById('newBtn').addEventListener('click',()=>{
  sid='ui-'+Date.now();atts=[];renderAtts();
  msgsEl.innerHTML='';showEmpty();loadSess();inpEl.focus();
});

// ── MESSAGES ─────────────────────────────────────────────────────
function showEmpty(){
  if(document.getElementById('empty')) return;
  const d=document.createElement('div');d.id='empty';
  d.innerHTML='<div class="e-icon">✦</div><div class="e-title">Kal-AI</div><div class="e-sub">Your local multi-agent team is ready</div><div class="e-chips">'+
    '<button class="ec" data-p="Review this code and suggest improvements:\n">Review code</button>'+
    '<button class="ec" data-p="Research and summarize: ">Research topic</button>'+
    '<button class="ec" data-p="Write documentation for: ">Write docs</button>'+
    '<button class="ec" data-p="Help me debug this issue:\n">Debug issue</button>'+
    '</div>';
  msgsEl.appendChild(d);bindChips(d);
}
function hideEmpty(){const e=document.getElementById('empty');if(e)e.remove();}

function addU(txt){
  hideEmpty();
  const row=document.createElement('div');row.className='mr u';
  const b=document.createElement('div');b.className='bub';
  const sp=document.createElement('span');sp.style.whiteSpace='pre-wrap';sp.textContent=txt;
  b.appendChild(sp);
  const acts=document.createElement('div');acts.className='macts';
  const cb=mkBtn('Copy');cb.addEventListener('click',()=>navigator.clipboard.writeText(txt).then(()=>{cb.lastChild.textContent='Copied!';setTimeout(()=>cb.lastChild.textContent='Copy',1800);}));
  acts.appendChild(cb);row.appendChild(b);row.appendChild(acts);msgsEl.appendChild(row);scrollBot();
}

function addA(txt,ak='manager'){
  hideEmpty();
  const ag=AGENTS[ak]||AGENTS.manager;
  const row=document.createElement('div');row.className='mr a';
  const lbl=document.createElement('div');lbl.className='al';
  lbl.innerHTML=`<span class="al-dot" style="background:${ag.color}"></span>${ag.emoji} ${ag.name}`;
  const b=document.createElement('div');b.className='bub';b.innerHTML=renderMd(txt);
  const acts=document.createElement('div');acts.className='macts';
  const cb=mkBtn('Copy');cb.addEventListener('click',()=>navigator.clipboard.writeText(txt).then(()=>{cb.lastChild.textContent='Copied!';setTimeout(()=>cb.lastChild.textContent='Copy',1800);}));
  acts.appendChild(cb);row.appendChild(lbl);row.appendChild(b);row.appendChild(acts);msgsEl.appendChild(row);scrollBot();
}

function streamBub(ak='manager'){
  hideEmpty();
  const ag=AGENTS[ak]||AGENTS.manager;
  const row=document.createElement('div');row.className='mr a';
  const lbl=document.createElement('div');lbl.className='al';
  lbl.innerHTML=`<span class="al-dot" style="background:${ag.color}"></span>${ag.emoji} ${ag.name}`;
  const b=document.createElement('div');b.className='bub';
  const cur=document.createElement('span');cur.className='cur';
  b.appendChild(cur);row.appendChild(lbl);row.appendChild(b);msgsEl.appendChild(row);scrollBot();
  let full='';
  return{
    append(c){full+=c;b.innerHTML=renderMd(full);b.appendChild(cur);scrollBot();},
    done(){
      cur.remove();
      const acts=document.createElement('div');acts.className='macts';
      const cb=mkBtn('Copy');const cap=full;
      cb.addEventListener('click',()=>navigator.clipboard.writeText(cap).then(()=>{cb.lastChild.textContent='Copied!';setTimeout(()=>cb.lastChild.textContent='Copy',1800);}));
      acts.appendChild(cb);row.appendChild(acts);
    },
  };
}

// ── ATTACHMENTS ──────────────────────────────────────────────────
document.getElementById('fileBtn').addEventListener('click',()=>document.getElementById('fi').click());
document.getElementById('fi').addEventListener('change',e=>{
  Array.from(e.target.files).forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{atts.push({name:f.name,content:ev.target.result});renderAtts();updSend();};
    r.readAsText(f);
  });e.target.value='';
});
function renderAtts(){
  const b=document.getElementById('abar');
  if(!atts.length){b.classList.add('off');b.innerHTML='';return;}
  b.classList.remove('off');
  b.innerHTML=atts.map((a,i)=>`<div class="ach"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>${esc(a.name)}<button class="arm" data-i="${i}">×</button></div>`).join('');
  b.querySelectorAll('.arm').forEach(btn=>btn.addEventListener('click',()=>{atts.splice(+btn.dataset.i,1);renderAtts();updSend();}));
}

// ── SEND ─────────────────────────────────────────────────────────
function send(){
  let raw=inpEl.value.trim();
  if(!raw&&!atts.length) return;
  let msg=raw;
  if(atts.length) msg+=(raw?'\n\n':'')+atts.map(a=>'```'+a.name+'\n'+a.content+'\n```').join('\n\n');
  atts=[];inpEl.value='';inpEl.style.height='auto';sndBtn.disabled=true;renderAtts();
  addU(raw||'(see attachments)');
  Object.keys(AGENTS).forEach(k=>setSt(k,'idle'));
  curStreams={};
  let active=streamBub('manager');curStreams.manager=active;

  fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,sessionId:sid})})
  .then(res=>{
    if(!res.ok) return res.json().catch(()=>({})).then(d=>{active.append('**Error:** '+(d.error||res.statusText));active.done();sndBtn.disabled=false;});
    const rd=res.body.getReader(),dec=new TextDecoder();let buf='';
    function pump(){return rd.read().then(({done,value})=>{
      if(done){sndBtn.disabled=false;inpEl.focus();loadSess();checkOllama();return;}
      buf+=dec.decode(value,{stream:true});
      buf.split('\n').forEach((line,i,arr)=>{
        if(i===arr.length-1){buf=line;return;}
        if(!line.startsWith('data: ')) return;
        try{
          const p=JSON.parse(line.slice(6));
          if(p.type==='status'){
            setSt(p.agent,p.status);
            if(p.status==='working'&&!curStreams[p.agent]){
              if(curStreams.manager){curStreams.manager.done();}
              const s=streamBub(p.agent);curStreams[p.agent]=s;active=s;
            }
          }
          if(p.type==='chunk'){(curStreams[p.agent]||active).append(p.chunk);}
          if(p.type==='synthesis_chunk'){
            if(!curStreams.syn){
              Object.values(curStreams).forEach(s=>s.done&&s.done());
              const s=streamBub('manager');curStreams.syn=s;active=s;
            }
            curStreams.syn.append(p.chunk);
          }
          if(p.type==='done'){Object.values(curStreams).forEach(s=>s.done&&s.done());curStreams={};}
          if(p.type==='error'){active.append('\n\n**Error:** '+p.message);active.done();sndBtn.disabled=false;}
        }catch(_){}
      });
      return pump();
    });}
    return pump();
  })
  .catch(()=>{active.append('Could not reach the server. Is it running?');active.done();sndBtn.disabled=false;});
}

function updSend(){sndBtn.disabled=!inpEl.value.trim()&&!atts.length;}
inpEl.addEventListener('input',()=>{inpEl.style.height='auto';inpEl.style.height=Math.min(inpEl.scrollHeight,180)+'px';updSend();});
inpEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
sndBtn.addEventListener('click',send);
document.getElementById('clearBtn').addEventListener('click',()=>{
  fetch(`/sessions/${sid}/clear`,{method:'POST'});
  msgsEl.innerHTML='';showEmpty();atts=[];renderAtts();updSend();
  Object.keys(AGENTS).forEach(k=>setSt(k,'idle'));
  loadSess();
});

// ── QUICK PROMPTS ────────────────────────────────────────────────
function bindChips(root){
  root.querySelectorAll('[data-p]').forEach(b=>b.addEventListener('click',()=>{inpEl.value=b.dataset.p;inpEl.dispatchEvent(new Event('input'));inpEl.focus();}));
}
bindChips(document);

// ── GITHUB PANEL ─────────────────────────────────────────────────
let ghOpen=false,selRepo=null;
document.getElementById('ghBtn').addEventListener('click',()=>{
  ghOpen=!ghOpen;
  document.getElementById('ghp').classList.toggle('off',!ghOpen);
  document.getElementById('ghBtn').classList.toggle('on',ghOpen);
  if(ghOpen) loadRepos();
});
document.getElementById('ghRefresh').addEventListener('click',loadRepos);

function loadRepos(){
  const b=document.getElementById('ghBody');
  b.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:24px">Loading…</div>';
  fetch('/github/repos').then(r=>r.json()).then(repos=>{
    if(repos.error){b.innerHTML=`<div class="go err">${esc(repos.error)}</div>`;return;}
    renderRepos(repos);
  }).catch(()=>b.innerHTML='<div class="go err">GitHub not configured.\nAdd GITHUB_TOKEN to your .env file</div>');
}

function renderRepos(repos){
  const b=document.getElementById('ghBody');
  let h='<div class="gs"><div class="gsl">Repositories</div>';
  repos.slice(0,25).forEach(r=>{
    const sel=selRepo&&selRepo.full_name===r.full_name;
    h+=`<div class="gri${sel?' sel':''}" data-r='${JSON.stringify({name:r.name,owner:r.owner.login,full_name:r.full_name,branch:r.default_branch||'main'})}'>`+
      `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`+
      `${esc(r.name)}<span style="margin-left:auto;font-size:11px;color:var(--muted)">${r.private?'🔒':''}</span></div>`;
  });
  h+='</div>';
  if(selRepo) h+=ghActions();
  b.innerHTML=h;
  b.querySelectorAll('.gri').forEach(el=>el.addEventListener('click',()=>{selRepo=JSON.parse(el.dataset.r);renderRepos(repos);}));
  bindGhActions();
}

function ghActions(){
  const r=selRepo;
  return `<div class="gs"><div class="gsl">📁 ${esc(r.name)}</div><button class="gb" id="browseBtn">Browse files</button></div>`+
  `<div class="gs"><div class="gsl">Commit file</div>`+
  `<input class="gi" id="gfp" placeholder="path/to/file.js"/>`+
  `<textarea class="gta" id="gfc" placeholder="File content…"></textarea>`+
  `<input class="gi" id="gcm" placeholder="Commit message"/>`+
  `<input class="gi" id="gbr" placeholder="Branch (default: ${esc(r.branch)})"/>`+
  `<button class="gb p" id="commitBtn">Commit & Push</button></div>`+
  `<div class="gs"><div class="gsl">Create Pull Request</div>`+
  `<input class="gi" id="gpt" placeholder="PR title"/>`+
  `<input class="gi" id="gph" placeholder="Head branch"/>`+
  `<textarea class="gta" id="gpb" placeholder="Description (optional)…"></textarea>`+
  `<button class="gb p" id="prBtn">Open PR</button></div>`+
  `<div class="gs"><div class="gsl">Open PRs</div><button class="gb" id="prsBtn">Load PRs</button><div id="prsList"></div></div>`+
  `<div id="ghOut"></div>`;
}

function bindGhActions(){
  const out=(m,t)=>{const e=document.getElementById('ghOut');if(e)e.innerHTML=`<div class="go ${t}">${esc(m)}</div>`;}

  const bb=document.getElementById('browseBtn');
  if(bb) bb.addEventListener('click',()=>{
    bb.textContent='Loading…';
    fetch(`/github/repos/${selRepo.owner}/${selRepo.name}/contents`).then(r=>r.json()).then(files=>{
      const e=document.getElementById('ghOut');
      if(e) e.innerHTML='<div class="gsl" style="margin-top:8px">Files</div>'+
        (Array.isArray(files)?files:[]).map(f=>`<div class="gfi">${f.type==='dir'?'📁':'📄'} ${esc(f.name)}</div>`).join('');
      bb.textContent='Browse files';
    }).catch(e=>{out(e.message,'err');bb.textContent='Browse files';});
  });

  const cb=document.getElementById('commitBtn');
  if(cb) cb.addEventListener('click',async()=>{
    const fp=document.getElementById('gfp')?.value.trim();
    const fc=document.getElementById('gfc')?.value;
    const cm=document.getElementById('gcm')?.value.trim();
    const br=document.getElementById('gbr')?.value.trim()||selRepo.branch;
    if(!fp||!fc||!cm){out('Fill in file path, content and commit message.','err');return;}
    cb.disabled=true;
    try{
      let sha;try{const ex=await fetch(`/github/repos/${selRepo.owner}/${selRepo.name}/contents?path=${encodeURIComponent(fp)}`).then(r=>r.json());if(ex.sha)sha=ex.sha;}catch(_){}
      const res=await fetch(`/github/repos/${selRepo.owner}/${selRepo.name}/commits`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:fp,content:fc,message:cm,branch:br,sha})}).then(r=>r.json());
      if(res.error)out(res.error,'err');else{out('✓ Committed successfully!','ok');toast('Committed!','ok');}
    }catch(e){out(e.message,'err');}
    cb.disabled=false;
  });

  const pb=document.getElementById('prBtn');
  if(pb) pb.addEventListener('click',async()=>{
    const t=document.getElementById('gpt')?.value.trim();
    const h=document.getElementById('gph')?.value.trim();
    const body=document.getElementById('gpb')?.value.trim();
    if(!t||!h){out('Fill in PR title and head branch.','err');return;}
    pb.disabled=true;
    try{
      const res=await fetch(`/github/repos/${selRepo.owner}/${selRepo.name}/pulls`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t,head:h,base:selRepo.branch,body:body||''})}).then(r=>r.json());
      if(res.error)out(res.error,'err');else{out(`✓ PR #${res.number} created!`,'ok');toast('PR created!','ok');}
    }catch(e){out(e.message,'err');}
    pb.disabled=false;
  });

  const prsb=document.getElementById('prsBtn');
  if(prsb) prsb.addEventListener('click',()=>{
    prsb.textContent='Loading…';
    fetch(`/github/repos/${selRepo.owner}/${selRepo.name}/pulls`).then(r=>r.json()).then(prs=>{
      const e=document.getElementById('prsList');
      e.innerHTML=!prs.length?'<div style="color:var(--muted);font-size:12px;padding:4px">No open PRs</div>':
        prs.map(p=>`<div class="pri"><div class="pri-t">#${p.number} ${esc(p.title)}</div><div class="pri-m">${esc(p.user.login)} · ${esc(p.head.ref)} → ${esc(p.base.ref)}</div></div>`).join('');
      prsb.textContent='Reload PRs';
    }).catch(e=>{out(e.message,'err');prsb.textContent='Load PRs';});
  });
}

// ── HELPERS ──────────────────────────────────────────────────────
function scrollBot(){if(msgsEl.scrollHeight-msgsEl.scrollTop-msgsEl.clientHeight<120)msgsEl.scrollTop=msgsEl.scrollHeight;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function rt(ms){const d=Date.now()-ms;if(d<60000)return'Just now';if(d<3600000)return Math.floor(d/60000)+'m ago';if(d<86400000)return Math.floor(d/3600000)+'h ago';return Math.floor(d/86400000)+'d ago';}
function mkBtn(label){
  const b=document.createElement('button');b.className='abtn';
  const ic=document.createElementNS('http://www.w3.org/2000/svg','svg');
  ic.setAttribute('width','11');ic.setAttribute('height','11');ic.setAttribute('viewBox','0 0 24 24');ic.setAttribute('fill','none');ic.setAttribute('stroke','currentColor');ic.setAttribute('stroke-width','2');ic.setAttribute('stroke-linecap','round');
  ic.innerHTML='<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>';
  b.appendChild(ic);b.appendChild(document.createTextNode(label));return b;
}
