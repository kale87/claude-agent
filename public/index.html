<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #09090f;
      --glow:       radial-gradient(ellipse 90% 70% at 15% 40%, rgba(99,79,200,.18) 0%, transparent 55%),
                    radial-gradient(ellipse 60% 50% at 85% 15%, rgba(59,130,246,.12) 0%, transparent 50%);
      --surface:    rgba(255,255,255,.04);
      --surface-h:  rgba(255,255,255,.08);
      --border:     rgba(255,255,255,.09);
      --border-h:   rgba(255,255,255,.2);
      --text:       #e2e2ee;
      --text-muted: #7070a0;
      --text-dim:   #333348;
      --accent:     #6366f1;
      --accent2:    #8b5cf6;
      --grad:       linear-gradient(135deg, #6366f1, #8b5cf6);
      --danger:     #f87171;
      --success:    #4ade80;
      --warning:    #fbbf24;
      --code-bg:    #0d1117;
      --sw:         220px;
      --r:          14px;
      --t:          .16s ease;
    }
    [data-theme="light"] {
      --bg:         #f4f4fb;
      --glow:       radial-gradient(ellipse 90% 70% at 15% 40%, rgba(99,79,200,.07) 0%, transparent 55%);
      --surface:    rgba(0,0,0,.03);
      --surface-h:  rgba(0,0,0,.06);
      --border:     rgba(0,0,0,.09);
      --border-h:   rgba(0,0,0,.2);
      --text:       #111128;
      --text-muted: #6060a0;
      --text-dim:   #c0c0da;
      --code-bg:    #f0f0f8;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px; line-height: 1.65;
      background: var(--bg); background-image: var(--glow);
      color: var(--text); display: flex; height: 100vh;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 4px; }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sw); flex-shrink: 0;
      display: flex; flex-direction: column; gap: 18px;
      padding: 14px 10px;
      background: var(--surface); border-right: 1px solid var(--border);
      overflow: hidden;
      transition: width var(--t), padding var(--t), opacity var(--t);
    }
    #sidebar.collapsed { width: 0; padding: 14px 0; opacity: 0; pointer-events: none; }
    .new-chat-btn {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 9px 14px;
      background: var(--grad); border: none; border-radius: 10px;
      color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: opacity var(--t), transform var(--t);
    }
    .new-chat-btn:hover { opacity: .85; transform: translateY(-1px); }
    .sec-label {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-muted); padding: 0 6px;
    }
    .sb-section { display: flex; flex-direction: column; gap: 6px; }
    #sessionsList { display: flex; flex-direction: column; gap: 2px; max-height: 220px; overflow-y: auto; }
    .sess-item { padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background var(--t); overflow: hidden; }
    .sess-item:hover { background: var(--surface-h); }
    .sess-item.active { background: rgba(99,102,241,.18); }
    .sess-preview { font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sess-time { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .chips-wrap { display: flex; flex-direction: column; gap: 4px; }
    .chip {
      padding: 7px 10px; text-align: left;
      background: var(--surface-h); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 12.5px;
      cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: all var(--t);
    }
    .chip:hover { background: rgba(99,102,241,.18); border-color: rgba(99,102,241,.35); color: var(--accent); }

    /* ── Main ── */
    #main { flex: 1; display: flex; overflow: hidden; min-width: 0; }
    #chatPanel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Git Panel ── */
    #gitPanel {
      width: 340px; flex-shrink: 0;
      display: flex; flex-direction: column;
      background: var(--surface); border-left: 1px solid var(--border);
      overflow: hidden;
      transition: width var(--t), opacity var(--t);
    }
    #gitPanel.hidden { width: 0; opacity: 0; pointer-events: none; }
    #gitPanel .panel-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #gitPanel .panel-hdr-title { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
    #gitPanel .panel-body { flex: 1; overflow-y: auto; padding: 14px 14px; display: flex; flex-direction: column; gap: 16px; }

    .git-branch-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: var(--surface-h);
      border: 1px solid var(--border); border-radius: 10px;
    }
    .branch-name { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .git-section-title { font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
    .git-file-list { display: flex; flex-direction: column; gap: 3px; }
    .git-file {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 10px; border-radius: 7px;
      font-size: 12.5px; cursor: pointer;
      transition: background var(--t);
      user-select: none;
    }
    .git-file:hover { background: var(--surface-h); }
    .git-file.staged { background: rgba(74,222,128,.07); }
    .git-file.staged:hover { background: rgba(74,222,128,.12); }
    .git-status-badge {
      font-size: 10px; font-weight: 700; width: 16px; text-align: center;
      flex-shrink: 0; font-family: monospace;
    }
    .git-status-badge.M { color: var(--warning); }
    .git-status-badge.A { color: var(--success); }
    .git-status-badge.D { color: var(--danger); }
    .git-status-badge.\? { color: var(--text-muted); }
    .git-status-badge.staged-M { color: var(--success); }
    .git-status-badge.staged-A { color: var(--success); }
    .git-file-path { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'SF Mono','Fira Code',monospace; }
    .git-file-actions { display: flex; gap: 4px; opacity: 0; transition: opacity var(--t); }
    .git-file:hover .git-file-actions { opacity: 1; }

    .git-commit-area { display: flex; flex-direction: column; gap: 8px; }
    .git-msg-input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; color: var(--text);
      font-family: inherit; font-size: 13px; resize: vertical; min-height: 72px;
      outline: none; transition: border-color var(--t);
    }
    .git-msg-input:focus { border-color: rgba(99,102,241,.55); }
    .git-msg-input::placeholder { color: var(--text-muted); }
    .git-btn-row { display: flex; gap: 6px; }
    .git-btn {
      flex: 1; padding: 8px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface-h);
      color: var(--text); font-size: 12.5px; font-weight: 600;
      cursor: pointer; transition: all var(--t); white-space: nowrap;
    }
    .git-btn:hover { border-color: var(--border-h); background: rgba(255,255,255,.1); }
    .git-btn.primary { background: var(--grad); border-color: transparent; color: #fff; }
    .git-btn.primary:hover { opacity: .85; }
    .git-btn:disabled { opacity: .4; cursor: not-allowed; }

    .git-log { display: flex; flex-direction: column; gap: 4px; }
    .git-log-item {
      display: flex; gap: 8px; align-items: baseline;
      padding: 5px 8px; border-radius: 6px; font-size: 12px;
    }
    .git-log-sha { font-family: monospace; color: var(--accent); font-size: 11px; flex-shrink: 0; }
    .git-log-msg { color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .git-output {
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      font-family: 'SF Mono','Fira Code',monospace; font-size: 11.5px;
      color: var(--text-muted); white-space: pre-wrap; word-break: break-all;
      max-height: 120px; overflow-y: auto;
    }
    .git-output.success { border-color: rgba(74,222,128,.3); color: var(--success); }
    .git-output.error { border-color: rgba(248,113,113,.3); color: var(--danger); }

    .git-new-branch-row { display: flex; gap: 6px; }
    .git-text-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 10px; color: var(--text);
      font-family: inherit; font-size: 12.5px; outline: none;
      transition: border-color var(--t);
    }
    .git-text-input:focus { border-color: rgba(99,102,241,.55); }
    .git-text-input::placeholder { color: var(--text-muted); }

    .git-select {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 10px; color: var(--text);
      font-family: inherit; font-size: 12.5px; outline: none;
      cursor: pointer;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 20px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .hdr-center { flex: 1; display: flex; align-items: center; gap: 10px; }
    .logo {
      font-size: 15px; font-weight: 700;
      background: var(--grad); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
    }
    .model-badge {
      font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 20px;
      background: var(--surface-h); border: 1px solid var(--border);
      color: var(--text-muted); white-space: nowrap;
    }
    .hdr-right { display: flex; gap: 4px; }

    .ibtn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid transparent; background: transparent;
      color: var(--text-muted); cursor: pointer;
      transition: all var(--t); flex-shrink: 0;
    }
    .ibtn:hover { background: var(--surface-h); border-color: var(--border); color: var(--text); }
    .ibtn.danger:hover { color: var(--danger); border-color: rgba(248,113,113,.3); background: rgba(248,113,113,.08); }
    .ibtn.active { background: rgba(99,102,241,.18); border-color: rgba(99,102,241,.35); color: var(--accent); }

    /* ── Messages ── */
    #messages { flex: 1; overflow-y: auto; padding: 32px 28px; display: flex; flex-direction: column; gap: 24px; }

    #emptyState {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 40px; text-align: center;
      animation: fadeUp .3s ease;
    }
    .empty-icon {
      width: 60px; height: 60px; border-radius: 18px; background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; box-shadow: 0 8px 32px rgba(99,102,241,.3);
    }
    .empty-title { font-size: 22px; font-weight: 700; }
    .empty-sub { font-size: 14px; color: var(--text-muted); }
    .empty-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
    .empty-chip {
      padding: 8px 16px; border-radius: 20px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 13px; cursor: pointer; transition: all var(--t);
    }
    .empty-chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(99,102,241,.1); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg-row { display: flex; flex-direction: column; gap: 6px; animation: fadeUp .2s ease; }
    .msg-row.user { align-items: flex-end; }
    .msg-row.assistant { align-items: flex-start; }
    .bubble {
      max-width: min(78%, 700px); padding: 13px 17px;
      border-radius: var(--r); font-size: 14px; line-height: 1.7; word-break: break-word;
    }
    .msg-row.user .bubble {
      background: var(--grad); color: #fff; border-bottom-right-radius: 4px;
      box-shadow: 0 4px 20px rgba(99,102,241,.25);
    }
    .msg-row.assistant .bubble {
      background: var(--surface); border: 1px solid var(--border);
      border-bottom-left-radius: 4px; color: var(--text);
    }
    .msg-meta { font-size: 11px; color: var(--text-muted); }
    .msg-actions { display: flex; gap: 4px; opacity: 0; transition: opacity var(--t); }
    .msg-row:hover .msg-actions { opacity: 1; }
    .act-btn {
      display: flex; align-items: center; gap: 5px; padding: 4px 9px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-muted); font-size: 11.5px;
      cursor: pointer; transition: all var(--t);
    }
    .act-btn:hover { color: var(--text); border-color: var(--border-h); }
    .msg-attaches { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .msg-att {
      display: flex; align-items: center; gap: 5px; padding: 3px 8px;
      background: rgba(255,255,255,.15); border-radius: 6px;
      font-size: 12px; color: rgba(255,255,255,.9);
    }
    .msg-att img { width: 18px; height: 18px; object-fit: cover; border-radius: 3px; }

    /* Markdown */
    .bubble p { margin-bottom: .65em; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble h1,.bubble h2,.bubble h3 { font-weight: 700; margin: .9em 0 .35em; line-height: 1.3; }
    .bubble h1 { font-size: 1.25em; } .bubble h2 { font-size: 1.1em; } .bubble h3 { font-size: 1em; }
    .bubble ul,.bubble ol { padding-left: 1.4em; margin-bottom: .65em; }
    .bubble li { margin-bottom: .2em; }
    .bubble a { color: var(--accent); text-decoration: underline; }
    .bubble strong { font-weight: 700; } .bubble em { font-style: italic; }
    .bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-muted); margin: .6em 0; }
    .bubble hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
    .bubble table { border-collapse: collapse; width: 100%; margin-bottom: .65em; font-size: 13px; }
    .bubble th,.bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .bubble th { background: var(--surface-h); font-weight: 600; }
    .bubble :not(pre) > code {
      background: var(--surface-h); border: 1px solid var(--border); border-radius: 4px;
      padding: 1px 5px; font-family: 'SF Mono','Fira Code',monospace; font-size: .85em;
    }
    .code-block { background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin: .6em 0; font-size: 13px; }
    .code-hdr { display: flex; align-items: center; justify-content: space-between; padding: 7px 14px; background: rgba(255,255,255,.04); border-bottom: 1px solid var(--border); }
    .code-lang { font-size: 11px; color: var(--text-muted); font-family: monospace; }
    .copy-code { font-size: 11px; padding: 2px 8px; background: var(--surface-h); border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); cursor: pointer; transition: all var(--t); }
    .copy-code:hover { color: var(--text); border-color: var(--border-h); }
    .code-block pre { margin: 0; padding: 14px 16px; overflow-x: auto; }
    .code-block pre code { background: none !important; border: none !important; padding: 0 !important; font-size: 1em; }

    #messages.loading .msg-row { animation: none !important; }
    .hist-loader { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 13px; gap: 8px; }
    .hist-loader::before { content: ''; width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border-h); border-top-color: var(--accent); animation: spin .7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .img-placeholder { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; background: rgba(255,255,255,.15); font-size: 12px; color: rgba(255,255,255,.8); margin-bottom: 6px; }
    .cursor { display: inline-block; width: 2px; height: 1.1em; background: var(--accent); margin-left: 2px; vertical-align: text-bottom; border-radius: 1px; animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

    /* Attach bar */
    #attachBar { padding: 8px 28px; border-top: 1px solid var(--border); background: var(--surface); display: flex; flex-wrap: wrap; gap: 8px; }
    #attachBar.hidden { display: none; }
    .att-chip { display: flex; align-items: center; gap: 6px; padding: 4px 10px 4px 8px; background: var(--surface-h); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; color: var(--text); }
    .att-thumb { width: 20px; height: 20px; object-fit: cover; border-radius: 4px; }
    .att-remove { display: flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: var(--border-h); border: none; color: var(--text-muted); cursor: pointer; font-size: 11px; transition: all var(--t); }
    .att-remove:hover { background: var(--danger); color: #fff; }

    /* System prompt bar */
    #systemBar { padding: 6px 28px; border-top: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 8px; }
    #systemBar.hidden { display: none; }
    #systemInput { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; color: var(--text); font-family: inherit; font-size: 12.5px; outline: none; transition: border-color var(--t); }
    #systemInput:focus { border-color: rgba(99,102,241,.55); }
    #systemInput::placeholder { color: var(--text-muted); }
    #systemBar .sys-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

    /* Input area */
    #inputArea { padding: 14px 28px 18px; border-top: 1px solid var(--border); background: var(--surface); }
    .input-box { display: flex; flex-direction: column; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); transition: border-color var(--t), box-shadow var(--t); }
    .input-box:focus-within { border-color: rgba(99,102,241,.55); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    #input { background: transparent; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 14px; line-height: 1.65; padding: 13px 16px; resize: none; max-height: 200px; overflow-y: auto; }
    #input::placeholder { color: var(--text-muted); }
    .input-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-top: 1px solid var(--border); }
    .input-tools { display: flex; gap: 2px; }
    .send-btn { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 10px; border: none; background: var(--grad); color: #fff; cursor: pointer; flex-shrink: 0; transition: opacity var(--t), transform var(--t); }
    .send-btn:hover:not(:disabled) { opacity: .85; transform: translateY(-1px) scale(1.05); }
    .send-btn:disabled { opacity: .28; cursor: not-allowed; transform: none; }
    .hint { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 6px; }
    .usage-badge { font-size: 11px; color: var(--text-muted); padding: 0 4px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px);
      background: var(--surface-h); border: 1px solid var(--border); border-radius: 10px;
      padding: 9px 18px; font-size: 13px; color: var(--text);
      opacity: 0; transition: all .2s ease; pointer-events: none; z-index: 9999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: rgba(74,222,128,.4); color: var(--success); }
    #toast.error { border-color: rgba(248,113,113,.4); color: var(--danger); }
  </style>
</head>
<body>

<aside id="sidebar">
  <button class="new-chat-btn" id="newChatBtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New chat
  </button>
  <div class="sb-section">
    <div class="sec-label">Recent</div>
    <div id="sessionsList"></div>
  </div>
  <div class="sb-section">
    <div class="sec-label">Quick prompts</div>
    <div class="chips-wrap">
      <button class="chip" data-prompt="Review this code and suggest improvements:">📋 Review code</button>
      <button class="chip" data-prompt="Explain what this code does in simple terms:">💡 Explain file</button>
      <button class="chip" data-prompt="Refactor this for better readability and performance:">⚡ Refactor</button>
      <button class="chip" data-prompt="Write comprehensive tests for this code:">🧪 Write tests</button>
      <button class="chip" data-prompt="Find bugs and security issues in this code:">🐛 Find bugs</button>
      <button class="chip" data-prompt="Write a conventional commit message for these changes:">📝 Commit msg</button>
    </div>
  </div>
</aside>

<div id="main">
  <div id="chatPanel">
    <header>
      <button class="ibtn" id="sidebarToggle" title="Toggle sidebar">

<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
<script>
// ── Markdown ────────────────────────────────────────────────────────
(function() {
  var r = new marked.Renderer();
  r.code = function(code, lang) {
    var l = lang && hljs.getLanguage(lang) ? lang : 'plaintext';
    var hi = hljs.highlight(code, { language: l }).value;
    var uid = 'cb' + Math.random().toString(36).slice(2,8);
    return '<div class="code-block"><div class="code-hdr"><span class="code-lang">'+l+'</span>' +
      '<button class="copy-code" data-uid="'+uid+'">Copy</button></div>' +
      '<pre id="'+uid+'"><code class="hljs">'+hi+'</code></pre></div>';
  };
  marked.setOptions({ renderer: r, breaks: true, gfm: true });
})();
function renderMd(t) { return DOMPurify.sanitize(marked.parse(t), { ADD_ATTR: ['data-uid'] }); }
document.addEventListener('click', function(e) {
  var btn = e.target.closest('.copy-code');
  if (!btn) return;
  var el = document.getElementById(btn.dataset.uid);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(function() {
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = 'Copy'; }, 1800);
  });
});

// ── Toast ────────────────────────────────────────────────────────────
var toastTimer;
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.className = ''; }, 2800);
}

// ── State ────────────────────────────────────────────────────────────
var sessionId = 'ui-' + Date.now();
var attachments = [];
var msgEl   = document.getElementById('messages');
var inputEl = document.getElementById('input');
var sendBtn = document.getElementById('sendBtn');

// ── Theme ────────────────────────────────────────────────────────────
var MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
var SUN  = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeIco').innerHTML = t === 'dark' ? MOON : SUN;
}
document.getElementById('themeBtn').addEventListener('click', function() {
  var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next);
  applyTheme(next);
});
applyTheme(localStorage.getItem('theme') || 'dark');

// ── Sidebar ──────────────────────────────────────────────────────────
document.getElementById('sidebarToggle').addEventListener('click', function() {
  document.getElementById('sidebar').classList.toggle('collapsed');
});

// ── System prompt bar ────────────────────────────────────────────────
var systemBarVisible = false;
document.getElementById('systemBtn').addEventListener('click', function() {
  systemBarVisible = !systemBarVisible;
  document.getElementById('systemBar').classList.toggle('hidden', !systemBarVisible);
  document.getElementById('systemBtn').classList.toggle('active', systemBarVisible);
  if (systemBarVisible) document.getElementById('systemInput').focus();
});
document.getElementById('systemInput').addEventListener('change', function() {
  var val = this.value.trim();
  fetch('/sessions/' + sessionId + '/system', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ systemPrompt: val }),
  });
});

// ── Export ───────────────────────────────────────────────────────────
document.getElementById('exportBtn').addEventListener('click', function() {
  var a = document.createElement('a');
  a.href = '/sessions/' + sessionId + '/export';
  a.download = 'chat.md';
  a.click();
});

// ── Model badge ──────────────────────────────────────────────────────
fetch('/health').then(function(r) { return r.json(); }).then(function(d) {
  if (d.model) {
    var short = d.model.replace('claude-', '').replace(/-\d{8}$/, '');
    document.getElementById('modelBadge').textContent = short;
  }
}).catch(function() {});

// ── Sessions ─────────────────────────────────────────────────────────
function loadSessions() {
  fetch('/sessions').then(function(r) { return r.json(); }).then(function(list) {
    var el = document.getElementById('sessionsList');
    if (!list.length) {
      el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:6px 8px">No sessions yet</div>';
      return;
    }
    el.innerHTML = list.map(function(s) {
      return '<div class="sess-item' + (s.id === sessionId ? ' active' : '') + '" data-id="' + esc(s.id) + '">' +
        '<div class="sess-preview">' + esc(s.preview || 'Empty session') + '</div>' +
        '<div class="sess-time">' + relTime(s.lastAccessed) + '</div></div>';
    }).join('');
    el.querySelectorAll('.sess-item').forEach(function(item) {
      item.addEventListener('click', function() { switchSession(item.dataset.id); });
    });
  }).catch(function() {});
}

function switchSession(id) {
  if (id === sessionId) return;
  sessionId = id;
  attachments = [];
  renderAttachBar();
  document.querySelectorAll('.sess-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.id === id);
  });
  msgEl.innerHTML = '<div class="hist-loader">Loading conversation</div>';
  fetch('/sessions/' + encodeURIComponent(id) + '/messages')
    .then(function(r) { return r.json(); })
    .then(function(msgs) {
      msgEl.innerHTML = '';
      if (!msgs.length) { showEmpty(); loadSessions(); return; }
      msgEl.classList.add('loading');
      msgs.forEach(function(m) {
        var rawContent = m.content;
        var text = typeof rawContent === 'string' ? rawContent
          : ((rawContent.find(function(b) { return b.type === 'text'; }) || {}).text || '');
        var hadImage = Array.isArray(rawContent) &&
          rawContent.some(function(b) { return b.type === 'text' && b.text === '[uploaded image]'; });
        if (m.role === 'user') {
          addUserBubble(text || '', hadImage ? [{ type: 'image-placeholder' }] : []);
        } else {
          if (text) addAssistantBubble(text);
        }
      });
      requestAnimationFrame(function() {
        msgEl.classList.remove('loading');
        msgEl.scrollTop = msgEl.scrollHeight;
      });
      loadSessions();
    }).catch(function() { msgEl.innerHTML = ''; showEmpty(); loadSessions(); });
}

document.getElementById('newChatBtn').addEventListener('click', function() {
  sessionId = 'ui-' + Date.now();
  attachments = [];
  renderAttachBar();
  clearMsgs();
  showEmpty();
  document.getElementById('systemInput').value = '';
  document.getElementById('usageBadge').textContent = '';
  loadSessions();
  inputEl.focus();
});

// ── Messages ─────────────────────────────────────────────────────────
function clearMsgs() { msgEl.innerHTML = ''; }
function showEmpty() {
  if (document.getElementById('emptyState')) return;
  var d = document.createElement('div'); d.id = 'emptyState';
  d.innerHTML = '<div class="empty-icon">&#10022;</div>' +
    '<div class="empty-title">How can I help?</div>' +
    '<div class="empty-sub">Ask anything, upload a file, or choose a prompt below</div>' +
    '<div class="empty-chips">' +
    '<button class="empty-chip" data-prompt="Explain this to me: ">Explain something</button>' +
    '<button class="empty-chip" data-prompt="Review this code and suggest improvements:">Review code</button>' +
    '<button class="empty-chip" data-prompt="Help me debug this: ">Debug an error</button>' +
    '<button class="empty-chip" data-prompt="Write a function that ">Write code</button>' +
    '<button class="empty-chip" data-prompt="What are the best practices for ">Best practices</button>' +
    '</div>';
  msgEl.appendChild(d);
  bindChips(d);
}
function hideEmpty() { var e = document.getElementById('emptyState'); if (e) e.remove(); }

function addUserBubble(text, chips) {
  hideEmpty();
  var row = document.createElement('div'); row.className = 'msg-row user';
  var bub = document.createElement('div'); bub.className = 'bubble';
  if (chips && chips.length) {
    var wrap = document.createElement('div'); wrap.className = 'msg-attaches';
    chips.forEach(function(c) {
      var chip = document.createElement('div');
      if (c.type === 'image-placeholder') {
        chip.className = 'img-placeholder';
        chip.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Image';
      } else {
        chip.className = 'msg-att';
        if (c.type === 'image') { var img = document.createElement('img'); img.src = c.preview; chip.appendChild(img); }
        chip.appendChild(document.createTextNode(c.name));
      }
      wrap.appendChild(chip);
    });
    bub.appendChild(wrap);
  }
  var span = document.createElement('span'); span.style.whiteSpace = 'pre-wrap'; span.textContent = text;
  bub.appendChild(span);
  var acts = document.createElement('div'); acts.className = 'msg-actions';
  var cb = mkActBtn('Copy');
  cb.addEventListener('click', function() {
    navigator.clipboard.writeText(text).then(function() { cb.lastChild.textContent = 'Copied!'; setTimeout(function() { cb.lastChild.textContent = 'Copy'; }, 1800); });
  });
  acts.appendChild(cb);
  row.appendChild(bub); row.appendChild(acts); msgEl.appendChild(row); scrollBot();
}

function addAssistantBubble(text, usage) {
  hideEmpty();
  var row = document.createElement('div'); row.className = 'msg-row assistant';
  var bub = document.createElement('div'); bub.className = 'bubble';
  bub.innerHTML = renderMd(text);
  var acts = document.createElement('div'); acts.className = 'msg-actions';
  if (usage) {
    var meta = document.createElement('span'); meta.className = 'msg-meta';
    meta.textContent = (usage.input_tokens || 0) + ' in · ' + (usage.output_tokens || 0) + ' out';
    acts.appendChild(meta);
  }
  var cb = mkActBtn('Copy');
  cb.addEventListener('click', function() {
    navigator.clipboard.writeText(text).then(function() { cb.lastChild.textContent = 'Copied!'; setTimeout(function() { cb.lastChild.textContent = 'Copy'; }, 1800); });
  });
  acts.appendChild(cb);
  row.appendChild(bub); row.appendChild(acts); msgEl.appendChild(row); scrollBot();
}

function createStreamBubble() {
  hideEmpty();
  var row = document.createElement('div'); row.className = 'msg-row assistant';
  var bub = document.createElement('div'); bub.className = 'bubble';
  var cur = document.createElement('span'); cur.className = 'cursor';
  bub.appendChild(cur); row.appendChild(bub); msgEl.appendChild(row); scrollBot();
  var full = '';
  return {
    append: function(chunk) {
      full += chunk; bub.innerHTML = renderMd(full); bub.appendChild(cur); scrollBot();
    },
    complete: function(usage) {
      cur.remove();
      var acts = document.createElement('div'); acts.className = 'msg-actions';
      if (usage) {
        var meta = document.createElement('span'); meta.className = 'msg-meta';
        meta.textContent = (usage.input_tokens || 0) + ' in · ' + (usage.output_tokens || 0) + ' out';
        acts.appendChild(meta);
        document.getElementById('usageBadge').textContent =
          (usage.input_tokens || 0) + ' in / ' + (usage.output_tokens || 0) + ' out';
      }
      var cb = mkActBtn('Copy');
      var captured = full;
      cb.addEventListener('click', function() {
        navigator.clipboard.writeText(captured).then(function() {
          cb.lastChild.textContent = 'Copied!'; setTimeout(function() { cb.lastChild.textContent = 'Copy'; }, 1800);
        });
      });
      acts.appendChild(cb);
      row.appendChild(acts);
    }
  };
}

// ── Attachments ───────────────────────────────────────────────────────
document.getElementById('fileBtn').addEventListener('click', function() { document.getElementById('fileInput').click(); });
document.getElementById('imgBtn').addEventListener('click', function() { document.getElementById('imgInput').click(); });
document.getElementById('fileInput').addEventListener('change', function(e) {
  Array.from(e.target.files).forEach(function(f) {
    var r = new FileReader();
    r.onload = function(ev) { attachments.push({ name: f.name, type: 'text', content: ev.target.result }); renderAttachBar(); updateSend(); };
    r.readAsText(f);
  }); e.target.value = '';
});
document.getElementById('imgInput').addEventListener('change', function(e) {
  Array.from(e.target.files).forEach(function(f) {
    var r = new FileReader();
    r.onload = function(ev) {
      var url = ev.target.result; var parts = url.split(',');
      var mt = parts[0].match(/:(.*?);/)[1];
      attachments.push({ name: f.name, type: 'image', data: parts[1], mediaType: mt, preview: url });
      renderAttachBar(); updateSend();
    }; r.readAsDataURL(f);
  }); e.target.value = '';
});
function renderAttachBar() {
  var bar = document.getElementById('attachBar');
  if (!attachments.length) { bar.classList.add('hidden'); bar.innerHTML = ''; return; }
  bar.classList.remove('hidden');
  bar.innerHTML = attachments.map(function(a, i) {
    return '<div class="att-chip">' +
      (a.type === 'image' ? '<img class="att-thumb" src="' + a.preview + '" />'
        : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>') +
      esc(a.name) + '<button class="att-remove" data-i="' + i + '">\u00d7</button></div>';
  }).join('');
  bar.querySelectorAll('.att-remove').forEach(function(btn) {
    btn.addEventListener('click', function() { attachments.splice(+btn.dataset.i, 1); renderAttachBar(); updateSend(); });
  });
}

// ── Send ──────────────────────────────────────────────────────────────
function sendMessage() {
  var raw = inputEl.value.trim();
  if (!raw && !attachments.length) return;
  var textFiles = attachments.filter(function(a) { return a.type === 'text'; });
  var images    = attachments.filter(function(a) { return a.type === 'image'; });
  var chips     = attachments.slice();
  attachments   = [];
  var fullMsg = raw;
  if (textFiles.length) fullMsg += (raw ? '\n\n' : '') + textFiles.map(function(f) { return '```' + f.name + '\n' + f.content + '\n```'; }).join('\n\n');
  inputEl.value = ''; inputEl.style.height = 'auto'; sendBtn.disabled = true; renderAttachBar();
  addUserBubble(raw || '(see attachments)', chips);
  var stream = createStreamBubble();
  var systemPrompt = document.getElementById('systemInput').value.trim();
  fetch('/chat/stream', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      message: fullMsg || '(see attached images)',
      sessionId: sessionId,
      system: systemPrompt || undefined,
      images: images.length ? images.map(function(i) { return { data: i.data, mediaType: i.mediaType }; }) : undefined,
    }),
  }).then(function(res) {
    if (!res.ok) {
      return res.json().catch(function() { return {}; }).then(function(d) {
        stream.append('**Error:** ' + (d.error || res.statusText)); stream.complete(); sendBtn.disabled = false;
      });
    }
    var reader = res.body.getReader(); var dec = new TextDecoder(); var buf = '';
    function pump() {
      return reader.read().then(function(result) {
        if (result.done) { sendBtn.disabled = false; inputEl.focus(); loadSessions(); return; }
        buf += dec.decode(result.value, { stream: true });
        var lines = buf.split('\n'); buf = lines.pop();
        lines.forEach(function(line) {
          if (!line.startsWith('data: ')) return;
          try {
            var p = JSON.parse(line.slice(6));
            if (p.chunk) stream.append(p.chunk);
            if (p.error) stream.append('\n\n**Error:** ' + p.error);
            if (p.done)  stream.complete(p.usage);
          } catch(e) {}
        });
        return pump();
      });
    }
    return pump();
  }).catch(function() { stream.append('Could not reach the agent. Is it running?'); stream.complete(); sendBtn.disabled = false; });
}

function updateSend() { sendBtn.disabled = !inputEl.value.trim() && !attachments.length; }
inputEl.addEventListener('input', function() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
  updateSend();
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);
document.getElementById('clearBtn').addEventListener('click', function() {
  fetch('/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId: sessionId }) });
  clearMsgs(); showEmpty(); attachments = []; renderAttachBar(); updateSend();
  document.getElementById('usageBadge').textContent = '';
  loadSessions();
});

// ── Quick prompts ─────────────────────────────────────────────────────
function bindChips(root) {
  root.querySelectorAll('[data-prompt]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      inputEl.value = btn.dataset.prompt;
      inputEl.dispatchEvent(new Event('input'));
      inputEl.focus();
    });
  });
}
bindChips(document);

// ── Git Panel ─────────────────────────────────────────────────────────
var gitPanelOpen = false;
var gitStatus = null;

document.getElementById('gitBtn').addEventListener('click', function() {
  gitPanelOpen = !gitPanelOpen;
  document.getElementById('gitPanel').classList.toggle('hidden', !gitPanelOpen);
  document.getElementById('gitBtn').classList.toggle('active', gitPanelOpen);
  if (gitPanelOpen) refreshGit();
});
document.getElementById('gitRefreshBtn').addEventListener('click', refreshGit);

function refreshGit() {
  var body = document.getElementById('gitPanelBody');
  body.innerHTML = '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px">Loading…</div>';
  Promise.all([
    fetch('/git/status').then(function(r) { return r.json(); }),
    fetch('/git/branches').then(function(r) { return r.json(); }),
  ]).then(function(results) {
    var st = results[0]; var br = results[1];
    if (st.error) { body.innerHTML = '<div class="git-output error">' + esc(st.error) + '</div>'; return; }
    gitStatus = st;
    renderGitPanel(st, br);
  }).catch(function(err) {
    body.innerHTML = '<div class="git-output error">Could not reach git API.\nMake sure the container has git and GIT_WORKDIR is set.</div>';
  });
}

function renderGitPanel(st, br) {
  var body = document.getElementById('gitPanelBody');
  var staged = st.files.filter(function(f) { return f.status.length === 2 && f.status[0] !== ' ' && f.status[0] !== '?'; });
  var unstaged = st.files.filter(function(f) { return !staged.includes(f); });

  var html = '';

  // Branch row
  html += '<div class="git-branch-row">';
  html += '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>';
  html += '<span class="branch-name">' + esc(st.branch) + '</span>';
  html += '<button class="git-btn" style="flex:0;padding:5px 10px;font-size:11.5px" id="gitPullBtn">Pull</button>';
  html += '</div>';

  // Switch branch
  if (br && br.branches && br.branches.length > 1) {
    html += '<div>';
    html += '<div class="git-section-title">Switch Branch</div>';
    html += '<div style="display:flex;gap:6px">';
    html += '<select class="git-select" id="gitBranchSelect">';
    br.branches.forEach(function(b) {
      html += '<option value="' + esc(b) + '"' + (b === st.branch ? ' selected' : '') + '>' + esc(b) + '</option>';
    });
    html += '</select>';
    html += '<button class="git-btn" style="flex:0;padding:5px 12px" id="gitCheckoutBtn">Go</button>';
    html += '</div>';
    html += '</div>';
  }

  // New branch
  html += '<div>';
  html += '<div class="git-section-title">New Branch</div>';
  html += '<div class="git-new-branch-row">';
  html += '<input class="git-text-input" id="gitNewBranchInput" placeholder="feature/my-branch" />';
  html += '<button class="git-btn" style="flex:0;padding:5px 12px" id="gitNewBranchBtn">Create</button>';
  html += '</div></div>';

  // Changed files
  html += '<div>';
  if (unstaged.length) {
    html += '<div class="git-section-title">Changed (' + unstaged.length + ')</div>';
    html += '<div class="git-file-list" id="gitUnstagedList">';
    unstaged.forEach(function(f, i) {
      var s = f.status.replace(/\s/g, '?');
      html += '<div class="git-file" data-path="' + esc(f.path) + '" data-idx="' + i + '">' +
        '<span class="git-status-badge ' + esc(s[s.length-1]) + '">' + esc(s[s.length-1]) + '</span>' +
        '<span class="git-file-path">' + esc(f.path) + '</span>' +
        '<div class="git-file-actions"><button class="git-btn" style="padding:2px 7px;font-size:11px" data-action="stage" data-path="' + esc(f.path) + '">+</button></div>' +
        '</div>';
    });
    html += '</div>';
  } else {
    html += '<div style="color:var(--text-muted);font-size:12.5px">No unstaged changes</div>';
  }
  html += '</div>';

  // Staged files
  if (staged.length) {
    html += '<div>';
    html += '<div class="git-section-title">Staged (' + staged.length + ')</div>';
    html += '<div class="git-file-list" id="gitStagedList">';
    staged.forEach(function(f) {
      html += '<div class="git-file staged" data-path="' + esc(f.path) + '">' +
        '<span class="git-status-badge staged-' + esc(f.status[0]) + '">' + esc(f.status[0]) + '</span>' +
        '<span class="git-file-path">' + esc(f.path) + '</span>' +
        '<div class="git-file-actions"><button class="git-btn" style="padding:2px 7px;font-size:11px" data-action="unstage" data-path="' + esc(f.path) + '">−</button></div>' +
        '</div>';
    });
    html += '</div></div>';
  }

  // Commit
  html += '<div class="git-commit-area">';
  html += '<div class="git-section-title">Commit</div>';
  html += '<textarea class="git-msg-input" id="gitCommitMsg" placeholder="Commit message"></textarea>';
  html += '<div class="git-btn-row">';
  html += '<button class="git-btn" id="gitStageAllBtn">Stage all</button>';
  html += '<button class="git-btn primary" id="gitCommitBtn">Commit</button>';
  html += '</div></div>';

  // Push
  html += '<div>';
  html += '<div class="git-section-title">Push / Pull</div>';
  html += '<div class="git-btn-row">';
  html += '<button class="git-btn primary" id="gitPushBtn">Push</button>';
  html += '<button class="git-btn" id="gitPushUpstreamBtn" style="font-size:11.5px">Push -u origin</button>';
  html += '</div></div>';

  // Recent commits
  if (st.commits && st.commits.length) {
    html += '<div>';
    html += '<div class="git-section-title">Recent commits</div>';
    html += '<div class="git-log">';
    st.commits.forEach(function(c) {
      html += '<div class="git-log-item"><span class="git-log-sha">' + esc(c.sha) + '</span><span class="git-log-msg">' + esc(c.message) + '</span></div>';
    });
    html += '</div></div>';
  }

  html += '<div id="gitOutputBox"></div>';

  body.innerHTML = html;
  bindGitEvents(st);
}

function gitOutput(msg, type) {
  var box = document.getElementById('gitOutputBox');
  if (!box) return;
  box.innerHTML = '<div class="git-output ' + (type || '') + '">' + esc(msg) + '</div>';
}

function bindGitEvents(st) {
  // Pull
  var pullBtn = document.getElementById('gitPullBtn');
  if (pullBtn) pullBtn.addEventListener('click', function() {
    pullBtn.disabled = true;
    fetch('/git/pull', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(d) {
      gitOutput(d.output || d.error, d.ok ? 'success' : 'error');
      if (d.ok) refreshGit();
    }).finally(function() { pullBtn.disabled = false; });
  });

  // Checkout
  var coBtn = document.getElementById('gitCheckoutBtn');
  if (coBtn) coBtn.addEventListener('click', function() {
    var sel = document.getElementById('gitBranchSelect');
    if (!sel) return;
    fetch('/git/checkout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ branch: sel.value }) })
      .then(function(r) { return r.json(); }).then(function(d) {
        if (d.ok) { showToast('Switched to ' + sel.value, 'success'); refreshGit(); }
        else gitOutput(d.error, 'error');
      });
  });

  // New branch
  var nbBtn = document.getElementById('gitNewBranchBtn');
  if (nbBtn) nbBtn.addEventListener('click', function() {
    var inp = document.getElementById('gitNewBranchInput');
    var name = inp ? inp.value.trim() : '';
    if (!name) return;
    fetch('/git/branch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name }) })
      .then(function(r) { return r.json(); }).then(function(d) {
        if (d.ok) { showToast('Created branch ' + name, 'success'); refreshGit(); }
        else gitOutput(d.error, 'error');
      });
  });

  // Stage/unstage file buttons
  document.querySelectorAll('[data-action="stage"]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      fetch('/git/stage', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paths: [btn.dataset.path] }) })
        .then(function() { refreshGit(); });
    });
  });
  document.querySelectorAll('[data-action="unstage"]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      fetch('/git/unstage', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paths: [btn.dataset.path] }) })
        .then(function() { refreshGit(); });
    });
  });

  // Stage all
  var saBtn = document.getElementById('gitStageAllBtn');
  if (saBtn) saBtn.addEventListener('click', function() {
    fetch('/git/stage', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paths: ['.'] }) })
      .then(function() { refreshGit(); });
  });

  // Commit
  var cmBtn = document.getElementById('gitCommitBtn');
  if (cmBtn) cmBtn.addEventListener('click', function() {
    var msg = document.getElementById('gitCommitMsg');
    var message = msg ? msg.value.trim() : '';
    if (!message) { gitOutput('Please enter a commit message.', 'error'); return; }
    cmBtn.disabled = true;
    fetch('/git/commit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: message }) })
      .then(function(r) { return r.json(); }).then(function(d) {
        if (d.ok) { showToast('Committed!', 'success'); refreshGit(); }
        else gitOutput(d.output || d.error, d.output ? '' : 'error');
      }).finally(function() { cmBtn.disabled = false; });
  });

  // Push
  var pushBtn = document.getElementById('gitPushBtn');
  if (pushBtn) pushBtn.addEventListener('click', function() {
    pushBtn.disabled = true;
    fetch('/git/push', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) })
      .then(function(r) { return r.json(); }).then(function(d) {
        gitOutput(d.output || d.error, d.ok ? 'success' : 'error');
        if (d.ok) showToast('Pushed!', 'success');
        refreshGit();
      }).finally(function() { pushBtn.disabled = false; });
  });

  // Push -u origin
  var puBtn = document.getElementById('gitPushUpstreamBtn');
  if (puBtn) puBtn.addEventListener('click', function() {
    puBtn.disabled = true;
    fetch('/git/push', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ setUpstream: true }) })
      .then(function(r) { return r.json(); }).then(function(d) {
        gitOutput(d.output || d.error, d.ok ? 'success' : 'error');
        if (d.ok) showToast('Pushed with upstream set!', 'success');
        refreshGit();
      }).finally(function() { puBtn.disabled = false; });
  });
}

// ── Helpers ───────────────────────────────────────────────────────────
function scrollBot() {
  if (msgEl.scrollHeight - msgEl.scrollTop - msgEl.clientHeight < 120) msgEl.scrollTop = msgEl.scrollHeight;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function relTime(ms) {
  var d = Date.now() - ms;
  if (d < 60000)    return 'Just now';
  if (d < 3600000)  return Math.floor(d/60000) + 'm ago';
  if (d < 86400000) return Math.floor(d/3600000) + 'h ago';
  return Math.floor(d/86400000) + 'd ago';
}
function mkActBtn(label) {
  var btn = document.createElement('button'); btn.className = 'act-btn';
  var ico = document.createElementNS('http://www.w3.org/2000/svg','svg');
  ico.setAttribute('width','11'); ico.setAttribute('height','11');
  ico.setAttribute('viewBox','0 0 24 24'); ico.setAttribute('fill','none');
  ico.setAttribute('stroke','currentColor'); ico.setAttribute('stroke-width','2'); ico.setAttribute('stroke-linecap','round');
  ico.innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>';
  btn.appendChild(ico); btn.appendChild(document.createTextNode(label));
  return btn;
}

loadSessions();
