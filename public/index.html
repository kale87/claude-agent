<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claude Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;
  --bg2:#0f0f1a;
  --surface:rgba(255,255,255,.04);
  --surface2:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.16);
  --text:#e2e2ee;
  --muted:#6060a0;
  --dim:#2a2a45;
  --accent:#6366f1;
  --accent2:#8b5cf6;
  --grad:linear-gradient(135deg,#6366f1,#8b5cf6);
  --success:#4ade80;
  --warning:#fbbf24;
  --danger:#f87171;
  --r:12px;
  --t:.15s ease;
  --agent-manager:#6366f1;
  --agent-coder:#10b981;
  --agent-researcher:#f59e0b;
  --agent-writer:#ec4899;
}
[data-theme="light"]{
  --bg:#f0f0f8;
  --bg2:#e8e8f4;
  --surface:rgba(0,0,0,.03);
  --surface2:rgba(0,0,0,.06);
  --border:rgba(0,0,0,.08);
  --border2:rgba(0,0,0,.18);
  --text:#111128;
  --muted:#5050a0;
  --dim:#c8c8e0;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Inter',-apple-system,sans-serif;
  font-size:14px;line-height:1.6;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;height:100vh;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── PIXEL OFFICE ── */
#office{
  flex-shrink:0;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0;
  position:relative;
  overflow:hidden;
  height:160px;
}
#officeCanvas{display:block;width:100%;height:160px;image-rendering:pixelated}

/* ── HEADER ── */
header{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.logo{font-size:15px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-center{flex:1;display:flex;align-items:center;gap:10px}
.model-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.header-right{display:flex;gap:4px}

/* ── AGENT STATUS PILLS ── */
#agentBar{
  display:flex;gap:8px;padding:8px 20px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;
}
.agent-pill{
  display:flex;align-items:center;gap:7px;
  padding:5px 12px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);
  font-size:12px;font-weight:500;
  transition:all var(--t);white-space:nowrap;
}
.agent-pill.idle{opacity:.5}
.agent-pill.thinking,.agent-pill.working,.agent-pill.synthesizing{opacity:1;border-color:var(--pill-color);box-shadow:0 0 12px -2px var(--pill-color)}
.agent-pill.done{opacity:.8}
.pill-dot{width:7px;height:7px;border-radius:50%;background:var(--pill-color);flex-shrink:0}
.agent-pill.thinking .pill-dot,.agent-pill.working .pill-dot,.agent-pill.synthesizing .pill-dot{
  animation:pulse .8s ease-in-out infinite alternate
}
@keyframes pulse{from{transform:scale(1);opacity:1}to{transform:scale(1.5);opacity:.6}}

/* ── LAYOUT ── */
#workspace{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── SIDEBAR ── */
#sidebar{
  width:220px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--surface);border-right:1px solid var(--border);
  overflow:hidden;transition:width var(--t),opacity var(--t)
}
#sidebar.collapsed{width:0;opacity:0;pointer-events:none}
.sb-top{padding:12px 10px;display:flex;flex-direction:column;gap:8px}
.new-btn{
  display:flex;align-items:center;gap:8px;
  width:100%;padding:9px 14px;
  background:var(--grad);border:none;border-radius:10px;
  color:#fff;font-size:13px;font-weight:600;
  cursor:pointer;transition:opacity var(--t)
}
.new-btn:hover{opacity:.85}
.sb-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:0 4px}
#sessionList{flex:1;overflow-y:auto;padding:0 6px 10px}
.sess-item{
  padding:8px 8px;border-radius:8px;cursor:pointer;
  transition:background var(--t);overflow:hidden;
  margin-bottom:2px;
}
.sess-item:hover{background:var(--surface2)}
.sess-item.active{background:rgba(99,102,241,.18)}
.sess-title{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess-time{font-size:11px;color:var(--muted);margin-top:2px}

/* ── CHAT ── */
#chatPanel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#messages{flex:1;overflow-y:auto;padding:28px 24px;display:flex;flex-direction:column;gap:20px}

/* empty state */
#emptyState{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:40px;text-align:center;animation:fadeUp .3s ease
}
.empty-icon{font-size:40px}
.empty-title{font-size:22px;font-weight:700}
.empty-sub{font-size:14px;color:var(--muted)}
.empty-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px}
.empty-chip{
  padding:8px 16px;border-radius:20px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-size:13px;cursor:pointer;transition:all var(--t)
}
.empty-chip:hover{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,.08)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* message rows */
.msg-row{display:flex;flex-direction:column;gap:5px;animation:fadeUp .2s ease}
.msg-row.user{align-items:flex-end}
.msg-row.assistant{align-items:flex-start}
.msg-agent-label{font-size:11px;color:var(--muted);padding:0 4px;display:flex;align-items:center;gap:5px}
.msg-agent-dot{width:6px;height:6px;border-radius:50%}
.bubble{
  max-width:min(78%,720px);padding:12px 16px;
  border-radius:var(--r);font-size:14px;line-height:1.7;word-break:break-word
}
.msg-row.user .bubble{
  background:var(--grad);color:#fff;border-bottom-right-radius:4px;
  box-shadow:0 4px 20px rgba(99,102,241,.25)
}
.msg-row.assistant .bubble{
  background:var(--surface);border:1px solid var(--border);
  border-bottom-left-radius:4px
}
.msg-actions{display:flex;gap:4px;opacity:0;transition:opacity var(--t)}
.msg-row:hover .msg-actions{opacity:1}
.act-btn{
  display:flex;align-items:center;gap:4px;padding:3px 8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer;transition:all var(--t)
}
.act-btn:hover{color:var(--text);border-color:var(--border2)}

/* agent response blocks */
.agent-block{
  margin:8px 0;padding:10px 14px;
  border-radius:10px;border-left:3px solid var(--block-color);
  background:rgba(0,0,0,.15);
  font-size:13px
}
.agent-block-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--block-color);margin-bottom:6px;display:flex;align-items:center;gap:6px}

/* markdown */
.bubble p{margin-bottom:.6em}
.bubble p:last-child{margin-bottom:0}
.bubble h1,.bubble h2,.bubble h3{font-weight:700;margin:.9em 0 .3em;line-height:1.3}
.bubble h1{font-size:1.2em}.bubble h2{font-size:1.1em}.bubble h3{font-size:1em}
.bubble ul,.bubble ol{padding-left:1.4em;margin-bottom:.6em}
.bubble li{margin-bottom:.2em}
.bubble a{color:var(--accent);text-decoration:underline}
.bubble strong{font-weight:700}.bubble em{font-style:italic}
.bubble blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--muted);margin:.5em 0}
.bubble table{border-collapse:collapse;width:100%;margin-bottom:.6em;font-size:13px}
.bubble th,.bubble td{border:1px solid var(--border);padding:5px 10px;text-align:left}
.bubble th{background:var(--surface2);font-weight:600}
.bubble :not(pre)>code{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:'JetBrains Mono',monospace;font-size:.85em}
.code-block{background:#0d1117;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:.5em 0;font-size:13px}
.code-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:rgba(255,255,255,.04);border-bottom:1px solid var(--border)}
.code-lang{font-size:11px;color:var(--muted);font-family:monospace}
.copy-btn{font-size:11px;padding:2px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;transition:all var(--t)}
.copy-btn:hover{color:var(--text)}
.code-block pre{margin:0;padding:14px 16px;overflow-x:auto}
.code-block pre code{background:none!important;border:none!important;padding:0!important}

/* streaming cursor */
.cursor{display:inline-block;width:2px;height:1em;background:var(--accent);margin-left:2px;vertical-align:text-bottom;border-radius:1px;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* attach bar */
#attachBar{padding:6px 24px;border-top:1px solid var(--border);background:var(--surface);display:flex;flex-wrap:wrap;gap:6px}
#attachBar.hidden{display:none}
.att-chip{display:flex;align-items:center;gap:5px;padding:3px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:12px}
.att-remove{display:flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--border2);border:none;color:var(--muted);cursor:pointer;font-size:10px;transition:all var(--t)}
.att-remove:hover{background:var(--danger);color:#fff}

/* input */
#inputArea{padding:12px 24px 16px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.input-box{display:flex;flex-direction:column;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);transition:border-color var(--t),box-shadow var(--t)}
.input-box:focus-within{border-color:rgba(99,102,241,.5);box-shadow:0 0 0 3px rgba(99,102,241,.08)}
#input{background:transparent;border:none;outline:none;color:var(--text);font-family:inherit;font-size:14px;line-height:1.65;padding:12px 16px;resize:none;max-height:180px;overflow-y:auto}
#input::placeholder{color:var(--muted)}
.input-toolbar{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-top:1px solid var(--border)}
.input-tools{display:flex;gap:2px}
.hint{font-size:11px;color:var(--dim);text-align:center;margin-top:5px}

/* icon button */
.ibtn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:all var(--t);flex-shrink:0}
.ibtn:hover{background:var(--surface2);border-color:var(--border);color:var(--text)}
.ibtn.active{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.3);color:var(--accent)}
.ibtn.danger:hover{color:var(--danger);border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.08)}

/* send */
.send-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;border:none;background:var(--grad);color:#fff;cursor:pointer;flex-shrink:0;transition:opacity var(--t),transform var(--t)}
.send-btn:hover:not(:disabled){opacity:.85;transform:translateY(-1px) scale(1.04)}
.send-btn:disabled{opacity:.25;cursor:not-allowed;transform:none}

/* ── GITHUB PANEL ── */
#ghPanel{
  width:320px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--surface);border-left:1px solid var(--border);
  overflow:hidden;transition:width var(--t),opacity var(--t)
}
#ghPanel.hidden{width:0;opacity:0;pointer-events:none}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.panel-body{flex:1;overflow-y:auto;padding:12px}
.gh-section{margin-bottom:16px}
.gh-section-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.gh-repo-item{
  display:flex;align-items:center;gap:8px;padding:7px 10px;
  border-radius:8px;cursor:pointer;font-size:12.5px;
  transition:background var(--t)
}
.gh-repo-item:hover{background:var(--surface2)}
.gh-repo-item.selected{background:rgba(99,102,241,.15);color:var(--accent)}
.gh-file-item{
  display:flex;align-items:center;gap:7px;padding:5px 8px;
  border-radius:6px;cursor:pointer;font-size:12px;
  font-family:'JetBrains Mono',monospace;
  transition:background var(--t)
}
.gh-file-item:hover{background:var(--surface2)}
.gh-btn{
  width:100%;padding:8px;border-radius:8px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-size:12.5px;font-weight:600;
  cursor:pointer;transition:all var(--t);margin-bottom:6px
}
.gh-btn:hover{border-color:var(--border2);background:rgba(255,255,255,.1)}
.gh-btn.primary{background:var(--grad);border-color:transparent;color:#fff}
.gh-btn.primary:hover{opacity:.85}
.gh-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:inherit;font-size:12.5px;outline:none;transition:border-color var(--t);margin-bottom:6px}
.gh-input:focus{border-color:rgba(99,102,241,.5)}
.gh-input::placeholder{color:var(--muted)}
.gh-textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:inherit;font-size:12.5px;outline:none;resize:vertical;min-height:64px;transition:border-color var(--t);margin-bottom:6px}
.gh-textarea:focus{border-color:rgba(99,102,241,.5)}
.gh-output{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);white-space:pre-wrap;word-break:break-all;max-height:100px;overflow-y:auto;margin-top:6px}
.gh-output.ok{border-color:rgba(74,222,128,.3);color:var(--success)}
.gh-output.err{border-color:rgba(248,113,113,.3);color:var(--danger)}
.pr-item{padding:8px 10px;border-radius:8px;background:var(--surface2);margin-bottom:4px;font-size:12.5px;cursor:pointer;transition:background var(--t)}
.pr-item:hover{background:rgba(99,102,241,.1)}
.pr-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-meta{font-size:11px;color:var(--muted);margin-top:2px}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 18px;font-size:13px;opacity:0;transition:all .2s;pointer-events:none;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:rgba(74,222,128,.4);color:var(--success)}
#toast.err{border-color:rgba(248,113,113,.4);color:var(--danger)}
</style>
</head>
<body>

<!-- Pixel Office -->
<div id="office"><canvas id="officeCanvas"></canvas></div>

<!-- Header -->
<header>
  <button class="ibtn" id="sidebarBtn" title="Toggle sidebar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="header-center">
    <span class="logo">Claude Agent</span>
    <span class="model-badge" id="modelBadge">v3</span>
  </div>
  <div class="header-right">
    <button class="ibtn" id="ghBtn" title="GitHub panel">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.11.82-.26.82-.57v-2c-3.34.72-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.14-.3-.54-1.52.1-3.18 0 0 1-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.28-1.55 3.29-1.23 3.29-1.23.65 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.69.83.57C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
    </button>
    <button class="ibtn" id="themeBtn" title="Toggle theme">
      <svg id="themeIco" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<!-- Agent status bar -->
<div id="agentBar"></div>

<!-- Main workspace -->
<div id="workspace">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sb-top">
      <button class="new-btn" id="newChatBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New chat
      </button>
      <div class="sb-label">Recent</div>
    </div>
    <div id="sessionList"></div>
  </aside>

  <!-- Chat -->
  <div id="chatPanel">
    <div id="messages">
      <div id="emptyState">
        <div class="empty-icon">✦</div>
        <div class="empty-title">What can I help with?</div>
        <div class="empty-sub">Your team of agents is ready</div>
        <div class="empty-chips">
          <button class="empty-chip" data-prompt="Review this code and suggest improvements: ">Review code</button>
          <button class="empty-chip" data-prompt="Research and summarize: ">Research topic</button>
          <button class="empty-chip" data-prompt="Write documentation for: ">Write docs</button>
          <button class="empty-chip" data-prompt="Help me debug this issue: ">Debug issue</button>
          <button class="empty-chip" data-prompt="Create a plan to: ">Make a plan</button>
        </div>
      </div>
    </div>
    <div id="attachBar" class="hidden"></div>
    <div id="inputArea">
      <input type="file" id="fileInput" accept=".js,.ts,.jsx,.tsx,.py,.go,.rs,.java,.cpp,.c,.cs,.html,.css,.json,.yaml,.yml,.md,.txt,.sh,.sql" hidden multiple />
      <div class="input-box">
        <textarea id="input" rows="1" placeholder="Message your agents…"></textarea>
        <div class="input-toolbar">
          <div class="input-tools">
            <button class="ibtn" id="fileBtn" title="Attach file">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button class="ibtn danger" id="clearBtn" title="Clear chat">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
          </div>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
        </div>
      </div>
      <p class="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
    </div>
  </div>

  <!-- GitHub Panel -->
  <div id="ghPanel" class="hidden">
    <div class="panel-hdr">
      <div class="panel-title">

<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
<script>
// ── AGENT CONFIG ─────────────────────────────────────────────────────────
const AGENTS = {
  manager:    { name:'Manager',    emoji:'🎯', color:'#6366f1' },
  coder:      { name:'Coder',      emoji:'💻', color:'#10b981' },
  researcher: { name:'Researcher', emoji:'🔍', color:'#f59e0b' },
  writer:     { name:'Writer',     emoji:'✍️', color:'#ec4899' },
};
const agentStatus = Object.fromEntries(Object.keys(AGENTS).map(k => [k, 'idle']));

// ── PIXEL OFFICE ─────────────────────────────────────────────────────────
const canvas = document.getElementById('officeCanvas');
const ctx = canvas.getContext('2d');
const SCALE = 3;
const W = Math.floor(canvas.parentElement.offsetWidth / SCALE) || 200;
const H = Math.floor(160 / SCALE);
canvas.width = W;
canvas.height = H;
convas.style.width = '100%';
canvas.style.height = '160px';

// Colors
const C = {
  bg:       () => getComputedStyle(document.documentElement).getPropertyValue('--bg2').trim() || '#0f0f1a',
  floor:    '#1a1a2e',
  desk:     '#2d2d50',
  deskTop:  '#3a3a60',
  monitor:  '#111130',
  screen:   '#1a3a1a',
  screenOn: '#00ff44',
  chair:    '#333355',
};

// Agent sprites — 8x8 pixel art, per agent color
function drawSprite(cx, cy, color, state, frame) {
  const c = color;
  const dark = shadeColor(c, -40);
  const light = shadeColor(c, 40);
  // body
  fillRect(cx+2, cy+3, 4, 4, c);
  // head
  fillRect(cx+2, cy+1, 4, 3, light);
  // eyes
  fillRect(cx+3, cy+2, 1, 1, '#000');
  fillRect(cx+5, cy+2, 1, 1, '#000');
  // legs
  if (state === 'idle') {
    fillRect(cx+2, cy+7, 2, 1, dark);
    fillRect(cx+5, cy+7, 2, 1, dark);
  } else if (state === 'working' || state === 'thinking') {
    // leaning forward — shift body up by 1
    fillRect(cx+2, cy+2, 4, 4, c);
    fillRect(cx+2, cy, 4, 3, light);
    fillRect(cx+3, cy+1, 1, 1, '#000');
    fillRect(cx+5, cy+1, 1, 1, '#000');
    // arms forward
    fillRect(cx+1, cy+3, 1, 2, dark);
    fillRect(cx+7, cy+3, 1, 2, dark);
  } else if (state === 'done') {
    // arms up
    fillRect(cx+2, cy+3, 4, 4, c);
    fillRect(cx+2, cy+1, 4, 3, light);
    fillRect(cx+3, cy+2, 1, 1, '#000');
    fillRect(cx+5, cy+2, 1, 1, '#000');
    fillRect(cx+1, cy+1, 1, 2, dark);
    fillRect(cx+7, cy+1, 1, 2, dark);
  }
  // blink every 60 frames
  if (frame % 60 < 3) {
    fillRect(cx+3, cy+2, 1, 1, light);
    fillRect(cx+5, cy+2, 1, 1, light);
  }
  // activity indicator
  if (state === 'thinking' || state === 'working' || state === 'synthesizing') {
    const dotFrame = Math.floor(frame / 8) % 3;
    for (let i = 0; i < 3; i++) {
      fillRect(cx+2+i*2, cy-2, 1, 1, i <= dotFrame ? c : '#333');
    }
  }
  if (state === 'done') {
    fillRect(cx+3, cy-2, 3, 1, '#4ade80');
  }
}

function fillRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function shadeColor(hex, amt) {
  let r = parseInt(hex.slice(1,3),16)+amt;
  let g = parseInt(hex.slice(3,5),16)+amt;
  let b = parseInt(hex.slice(5,7),16)+amt;
  r = Math.max(0,Math.min(255,r));
  g = Math.max(0,Math.min(255,g));
  b = Math.max(0,Math.min(255,b));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// Agent positions around the desk
const agentKeys = ['manager','coder','researcher','writer'];
const agentPositions = [
  { x: Math.floor(W*0.3)-4, y: Math.floor(H*0.3) },   // manager — top left of desk
  { x: Math.floor(W*0.5)-4, y: Math.floor(H*0.3) },   // coder — top right of desk
  { x: Math.floor(W*0.3)-4, y: Math.floor(H*0.6) },   // researcher — bottom left
  { x: Math.floor(W*0.5)-4, y: Math.floor(H*0.6) },   // writer — bottom right
];

let frame = 0;
function drawOffice() {
  ctx.clearRect(0,0,W,H);
  // floor
  ctx.fillStyle = C.floor;
  ctx.fillRect(0,0,W,H);
  // subtle grid
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let x=0;x<W;x+=4) ctx.fillRect(x,0,1,H);
  for (let y=0;y<H;y+=4) ctx.fillRect(0,y,W,1);
  // desk surface
  const deskX = Math.floor(W*0.22);
  const deskY = Math.floor(H*0.38);
  const deskW = Math.floor(W*0.45);
  const deskH = Math.floor(H*0.32);
  ctx.fillStyle = C.deskTop;
  ctx.fillRect(deskX, deskY, deskW, deskH);
  ctx.fillStyle = C.desk;
  ctx.fillRect(deskX, deskY+deskH, deskW, 2);
  ctx.fillRect(deskX, deskY, 2, deskH);
  ctx.fillRect(deskX+deskW-2, deskY, 2, deskH);
  // monitors on desk
  const monPositions = [
    { x: deskX+4, y: deskY+2 },
    { x: deskX+deskW/2+2, y: deskY+2 },
  ];
  monPositions.forEach((m, i) => {
    ctx.fillStyle = C.monitor;
    ctx.fillRect(m.x, m.y, 14, 10);
    const isActive = (i === 0 && (agentStatus.manager !== 'idle' || agentStatus.researcher !== 'idle'))
                  || (i === 1 && (agentStatus.coder !== 'idle' || agentStatus.writer !== 'idle'));
    ctx.fillStyle = isActive ? C.screenOn : C.screen;
    ctx.fillRect(m.x+1, m.y+1, 12, 8);
    // screen content animation
    if (isActive) {
      ctx.fillStyle = 'rgba(0,255,68,0.4)';
      for (let row=0;row<3;row++) {
        const lineW = Math.floor((frame*0.5 + row*7) % 10)+2;
        ctx.fillRect(m.x+2, m.y+2+row*2, lineW, 1);
      }
    }
    // stand
    ctx.fillStyle = C.desk;
    ctx.fillRect(m.x+6, m.y+10, 2, 2);
    ctx.fillRect(m.x+4, m.y+12, 6, 1);
  });
  // items on desk — coffee cup, papers
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(deskX+deskW-8, deskY+4, 4, 5);
  ctx.fillStyle = '#4a3a0a';
  ctx.fillRect(deskX+deskW-7, deskY+3, 2, 1);
  // paper stacks
  ctx.fillStyle = '#e0e0e0';
  ctx.fillRect(deskX+deskW-18, deskY+6, 8, 5);
  ctx.fillStyle = '#cccccc';
  ctx.fillRect(deskX+deskW-17, deskY+5, 8, 5);
  // agents
  agentKeys.forEach((key, i) => {
    const pos = agentPositions[i];
    const agent = AGENTS[key];
    drawSprite(pos.x, pos.y, agent.color, agentStatus[key], frame);
    // name label below sprite
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '3px monospace';
    ctx.fillText(agent.name.slice(0,4), pos.x+1, pos.y+11);
  });
  // title in corner
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '4px monospace';
  ctx.fillText('CLAUDE AGENT v3', W-55, H-3);
  frame++;
}

function startOffice() {
  drawOffice();
  requestAnimationFrame(startOffice);
}
startOffice();

// ── AGENT STATUS BAR ─────────────────────────────────────────────────────
const agentBar = document.getElementById('agentBar');
function renderAgentBar() {
  agentBar.innerHTML = Object.entries(AGENTS).map(([key, a]) => {
    const s = agentStatus[key];
    const label = { idle:'Idle', thinking:'Thinking…', working:'Working…', synthesizing:'Synthesizing…', done:'Done' }[s] || s;
    return `<div class="agent-pill ${s}" style="--pill-color:${a.color}">
      <div class="pill-dot"></div>
      <span>${a.emoji} ${a.name}</span>
      <span style="color:var(--muted);font-size:11px">${label}</span>
    </div>`;
  }).join('');
}
renderAgentBar();

function setAgentStatus(key, status) {
  agentStatus[key] = status;
  renderAgentBar();
}

// ── MARKDOWN ─────────────────────────────────────────────────────────────
(function(){
  const r = new marked.Renderer();
  r.code = function(code, lang) {
    const l = lang && hljs.getLanguage(lang) ? lang : 'plaintext';
    const hi = hljs.highlight(code, { language: l }).value;
    const uid = 'cb'+Math.random().toString(36).slice(2,8);
    return `<div class="code-block"><div class="code-hdr"><span class="code-lang">${l}</span><button class="copy-btn" data-uid="${uid}">Copy</button></div><pre id="${uid}"><code class="hljs">${hi}</code></pre></div>`;
  };
  marked.setOptions({ renderer:r, breaks:true, gfm:true });
})();
function renderMd(t) { return DOMPurify.sanitize(marked.parse(t), { ADD_ATTR:['data-uid'] }); }
document.addEventListener('click', e => {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const el = document.getElementById(btn.dataset.uid);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1800);
  });
});

// ── TOAST ─────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show'+(type?' '+type:'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className='', 2600);
}

// ── THEME ─────────────────────────────────────────────────────────────────
const MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
const SUN  = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeIco').innerHTML = t==='dark' ? MOON : SUN;
}
document.getElementById('themeBtn').addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next); applyTheme(next);
});
applyTheme(localStorage.getItem('theme') || 'dark');

// ── STATE ─────────────────────────────────────────────────────────────────
let sessionId = 'ui-'+Date.now();
let attachments = [];
const msgEl   = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

// ── SIDEBAR ───────────────────────────────────────────────────────────────
document.getElementById('sidebarBtn').addEventListener('click', () =>
  document.getElementById('sidebar').classList.toggle('collapsed'));

function loadSessions() {
  fetch('/sessions').then(r=>r.json()).then(list => {
    const el = document.getElementById('sessionList');
    if (!list.length) { el.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px 10px">No sessions yet</div>'; return; }
    el.innerHTML = list.map(s =>
      `<div class="sess-item${s.id===sessionId?' active':''}" data-id="${esc(s.id)}">
        <div class="sess-title">${esc(s.title||'Untitled')}</div>
        <div class="sess-time">${relTime(s.lastAccessed)}</div>
      </div>`
    ).join('');
    el.querySelectorAll('.sess-item').forEach(el =>
      el.addEventListener('click', () => switchSession(el.dataset.id)));
  }).catch(()=>{});
}

function switchSession(id) {
  if (id === sessionId) return;
  sessionId = id;
  document.querySelectorAll('.sess-item').forEach(e => e.classList.toggle('active', e.dataset.id===id));
  msgEl.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:40px">Loading…</div>';
  fetch(`/sessions/${encodeURIComponent(id)}/messages`).then(r=>r.json()).then(msgs => {
    msgEl.innerHTML = '';
    if (!msgs.length) { showEmpty(); return; }
    msgs.forEach(m => {
      if (m.role==='user') addUserBubble(m.content);
      else addAssistantBubble(m.content, m.agent || 'manager');
    });
    msgEl.scrollTop = msgEl.scrollHeight;
  });
}

document.getElementById('newChatBtn').addEventListener('click', () => {
  sessionId = 'ui-'+Date.now();
  attachments = [];
  renderAttachBar();
  msgEl.innerHTML = '';
  showEmpty();
  loadSessions();
  inputEl.focus();
});

// ── MESSAGES ──────────────────────────────────────────────────────────────
function showEmpty() {
  if (document.getElementById('emptyState')) return;
  const d = document.createElement('div'); d.id='emptyState';
  d.innerHTML = '<div class="empty-icon">✦</div><div class="empty-title">What can I help with?</div><div class="empty-sub">Your team of agents is ready</div><div class="empty-chips">'+
    '<button class="empty-chip" data-prompt="Review this code and suggest improvements: ">Review code</button>'+
    '<button class="empty-chip" data-prompt="Research and summarize: ">Research topic</button>'+
    '<button class="empty-chip" data-prompt="Write documentation for: ">Write docs</button>'+
    '<button class="empty-chip" data-prompt="Help me debug this issue: ">Debug issue</button>'+
    '</div>';
  msgEl.appendChild(d);
  bindChips(d);
}
function hideEmpty() { const e=document.getElementById('emptyState'); if(e) e.remove(); }

function addUserBubble(text) {
  hideEmpty();
  const row = document.createElement('div'); row.className='msg-row user';
  const bub = document.createElement('div'); bub.className='bubble';
  const span = document.createElement('span'); span.style.whiteSpace='pre-wrap'; span.textContent=text;
  bub.appendChild(span);
  const acts = document.createElement('div'); acts.className='msg-actions';
  const cb = mkActBtn('Copy');
  cb.addEventListener('click', () => navigator.clipboard.writeText(text).then(()=>{ cb.lastChild.textContent='Copied!'; setTimeout(()=>cb.lastChild.textContent='Copy',1800); }));
  acts.appendChild(cb);
  row.appendChild(bub); row.appendChild(acts); msgEl.appendChild(row); scrollBot();
}

function addAssistantBubble(text, agentKey='manager') {
  hideEmpty();
  const agent = AGENTS[agentKey] || AGENTS.manager;
  const row = document.createElement('div'); row.className='msg-row assistant';
  const label = document.createElement('div'); label.className='msg-agent-label';
  label.innerHTML=`<span class="msg-agent-dot" style="background:${agent.color}"></span>${agent.emoji} ${agent.name}`;
  const bub = document.createElement('div'); bub.className='bubble';
  bub.innerHTML = renderMd(text);
  const acts = document.createElement('div'); acts.className='msg-actions';
  const cb = mkActBtn('Copy');
  cb.addEventListener('click', () => navigator.clipboard.writeText(text).then(()=>{ cb.lastChild.textContent='Copied!'; setTimeout(()=>cb.lastChild.textContent='Copy',1800); }));
  acts.appendChild(cb);
  row.appendChild(label); row.appendChild(bub); row.appendChild(acts); msgEl.appendChild(row); scrollBot();
  return bub;
}

function createStreamBubble(agentKey='manager') {
  hideEmpty();
  const agent = AGENTS[agentKey] || AGENTS.manager;
  const row = document.createElement('div'); row.className='msg-row assistant';
  const label = document.createElement('div'); label.className='msg-agent-label';
  label.innerHTML=`<span class="msg-agent-dot" style="background:${agent.color}"></span>${agent.emoji} ${agent.name}`;
  const bub = document.createElement('div'); bub.className='bubble';
  const cur = document.createElement('span'); cur.className='cursor';
  bub.appendChild(cur); row.appendChild(label); row.appendChild(bub); msgEl.appendChild(row); scrollBot();
  let full='';
  return {
    key: agentKey,
    append(chunk) { full+=chunk; bub.innerHTML=renderMd(full); bub.appendChild(cur); scrollBot(); },
    complete() {
      cur.remove();
      const acts = document.createElement('div'); acts.className='msg-actions';
      const cb = mkActBtn('Copy');
      const cap=full;
      cb.addEventListener('click', () => navigator.clipboard.writeText(cap).then(()=>{ cb.lastChild.textContent='Copied!'; setTimeout(()=>cb.lastChild.textContent='Copy',1800); }));
      acts.appendChild(cb); row.appendChild(acts);
    },
    getText() { return full; },
  };
}

// ── ATTACHMENTS ───────────────────────────────────────────────────────────
document.getElementById('fileBtn').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e => {
  Array.from(e.target.files).forEach(f => {
    const r = new FileReader();
    r.onload = ev => { attachments.push({ name:f.name, content:ev.target.result }); renderAttachBar(); updateSend(); };
    r.readAsText(f);
  }); e.target.value='';
});
function renderAttachBar() {
  const bar=document.getElementById('attachBar');
  if (!attachments.length) { bar.classList.add('hidden'); bar.innerHTML=''; return; }
  bar.classList.remove('hidden');
  bar.innerHTML=attachments.map((a,i)=>`<div class="att-chip"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>${esc(a.name)}<button class="att-remove" data-i="${i}">×</button></div>`).join('');
  bar.querySelectorAll('.att-remove').forEach(btn => btn.addEventListener('click', () => { attachments.splice(+btn.dataset.i,1); renderAttachBar(); updateSend(); }));
}

// ── SEND ──────────────────────────────────────────────────────────────────
let currentStreams = {};

function sendMessage() {
  let raw = inputEl.value.trim();
  if (!raw && !attachments.length) return;
  let fullMsg = raw;
  if (attachments.length) fullMsg += (raw?'\n\n':'')+attachments.map(a=>'```'+a.name+'\n'+a.content+'\n```').join('\n\n');
  attachments=[];
  inputEl.value=''; inputEl.style.height='auto'; sendBtn.disabled=true; renderAttachBar();
  addUserBubble(raw || '(see attachments)');
  // reset agents
  Object.keys(AGENTS).forEach(k => setAgentStatus(k,'idle'));
  currentStreams = {};
  let activeStream = createStreamBubble('manager');
  currentStreams.manager = activeStream;

  fetch('/chat', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ message:fullMsg, sessionId }),
  }).then(res => {
    if (!res.ok) { return res.json().catch(()=>({})).then(d => { activeStream.append('**Error:** '+(d.error||res.statusText)); activeStream.complete(); sendBtn.disabled=false; }); }
    const reader=res.body.getReader(); const dec=new TextDecoder(); let buf='';
    function pump() {
      return reader.read().then(({done,value}) => {
        if (done) { sendBtn.disabled=false; inputEl.focus(); loadSessions(); return; }
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split('\n'); buf=lines.pop();
        lines.forEach(line => {
          if (!line.startsWith('data: ')) return;
          try {
            const p=JSON.parse(line.slice(6));
            if (p.type==='status') {
              setAgentStatus(p.agent, p.status);
              if (p.status==='working' && !currentStreams[p.agent]) {
                if (currentStreams.manager) currentStreams.manager.complete();
                const s = createStreamBubble(p.agent);
                currentStreams[p.agent]=s;
                activeStream=s;
              }
            }
            if (p.type==='chunk') {
              const stream = currentStreams[p.agent] || activeStream;
              stream.append(p.chunk);
            }
            if (p.type==='synthesis_chunk') {
              if (!currentStreams.synthesis) {
                Object.values(currentStreams).forEach(s=>s.complete&&s.complete());
                const s=createStreamBubble('manager');
                currentStreams.synthesis=s;
                activeStream=s;
              }
              currentStreams.synthesis.append(p.chunk);
            }
            if (p.type==='done') {
              Object.values(currentStreams).forEach(s=>s.complete&&s.complete());
              currentStreams={};
            }
            if (p.type==='error') {
              activeStream.append('\n\n**Error:** '+p.message);
              activeStream.complete();
              sendBtn.disabled=false;
            }
          } catch(e){}
        });
        return pump();
      });
    }
    return pump();
  }).catch(() => { activeStream.append('Could not reach the server.'); activeStream.complete(); sendBtn.disabled=false; });
}

function updateSend() { sendBtn.disabled=!inputEl.value.trim()&&!attachments.length; }
inputEl.addEventListener('input', () => { inputEl.style.height='auto'; inputEl.style.height=Math.min(inputEl.scrollHeight,180)+'px'; updateSend(); });
inputEl.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); } });
sendBtn.addEventListener('click', sendMessage);
document.getElementById('clearBtn').addEventListener('click', () => {
  fetch(`/sessions/${sessionId}/clear`, {method:'POST'});
  msgEl.innerHTML=''; showEmpty(); attachments=[]; renderAttachBar(); updateSend();
  Object.keys(AGENTS).forEach(k=>setAgentStatus(k,'idle'));
  loadSessions();
});

// ── QUICK PROMPTS ─────────────────────────────────────────────────────────
function bindChips(root) {
  root.querySelectorAll('[data-prompt]').forEach(btn =>
    btn.addEventListener('click', () => { inputEl.value=btn.dataset.prompt; inputEl.dispatchEvent(new Event('input')); inputEl.focus(); }));
}
bindChips(document);

// ── GITHUB PANEL ──────────────────────────────────────────────────────────
let ghOpen=false, selectedRepo=null;
document.getElementById('ghBtn').addEventListener('click', () => {
  ghOpen=!ghOpen;
  document.getElementById('ghPanel').classList.toggle('hidden',!ghOpen);
  document.getElementById('ghBtn').classList.toggle('active',ghOpen);
  if (ghOpen) loadGhRepos();
});
document.getElementById('ghRefresh').addEventListener('click', loadGhRepos);

function loadGhRepos() {
  const body=document.getElementById('ghBody');
  body.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Loading…</div>';
  fetch('/github/repos').then(r=>r.json()).then(repos => {
    if (repos.error) { body.innerHTML=`<div class="gh-output err">${esc(repos.error)}</div>`; return; }
    renderGhRepos(repos);
  }).catch(e => body.innerHTML=`<div class="gh-output err">GitHub not configured.\nAdd GITHUB_TOKEN to .env</div>`);
}

function renderGhRepos(repos) {
  const body=document.getElementById('ghBody');
  let html='<div class="gh-section"><div class="gh-section-title">Your Repos</div>';
  repos.slice(0,20).forEach(r => {
    html+=`<div class="gh-repo-item${selectedRepo&&selectedRepo.full_name===r.full_name?' selected':''}" data-repo='${JSON.stringify({name:r.name,owner:r.owner.login,full_name:r.full_name,default_branch:r.default_branch||'main'})}'>`+
      `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`+
      `<span>${esc(r.name)}</span>`+
      `<span style="color:var(--muted);font-size:11px;margin-left:auto">${r.private?'🔒':''}</span>`+
      `</div>`;
  });
  html+='</div>';
  if (selectedRepo) html+=renderGhActions();
  body.innerHTML=html;
  body.querySelectorAll('.gh-repo-item').forEach(el => {
    el.addEventListener('click', () => {
      selectedRepo=JSON.parse(el.dataset.repo);
      renderGhRepos(repos);
    });
  });
  bindGhActions();
}

function renderGhActions() {
  const r=selectedRepo;
  return `
    <div class="gh-section">
      <div class="gh-section-title">📁 ${esc(r.name)}</div>
      <button class="gh-btn" id="ghBrowseBtn">Browse files</button>
    </div>
    <div class="gh-section">
      <div class="gh-section-title">Commit file</div>
      <input class="gh-input" id="ghFilePath" placeholder="src/example.js" />
      <textarea class="gh-textarea" id="ghFileContent" placeholder="File content…"></textarea>
      <input class="gh-input" id="ghCommitMsg" placeholder="Commit message" />
      <input class="gh-input" id="ghBranch" placeholder="Branch (default: ${esc(r.default_branch)})" />
      <button class="gh-btn primary" id="ghCommitBtn">Commit & Push</button>
    </div>
    <div class="gh-section">
      <div class="gh-section-title">Create PR</div>
      <input class="gh-input" id="ghPrTitle" placeholder="PR title" />
      <input class="gh-input" id="ghPrHead" placeholder="Head branch" />
      <textarea class="gh-textarea" id="ghPrBody" placeholder="PR description…"></textarea>
      <button class="gh-btn primary" id="ghPrBtn">Open PR</button>
    </div>
    <div class="gh-section">
      <div class="gh-section-title">Open PRs</div>
      <button class="gh-btn" id="ghPrsBtn">Load PRs</button>
      <div id="ghPrsList"></div>
    </div>
    <div id="ghOutput"></div>
  `;
}

function bindGhActions() {
  const ghOut = (msg, type) => {
    const el=document.getElementById('ghOutput');
    if(el) el.innerHTML=`<div class="gh-output ${type}">${esc(msg)}</div>`;
  };

  const browseBtn=document.getElementById('ghBrowseBtn');
  if (browseBtn) browseBtn.addEventListener('click', () => {
    const {owner,name}=selectedRepo;
    browseBtn.textContent='Loading…';
    fetch(`/github/repos/${owner}/${name}/contents`).then(r=>r.json()).then(files => {
      const list=Array.isArray(files)?files:[];
      const el=document.getElementById('ghOutput');
      if(el) el.innerHTML='<div class="gh-section-title" style="margin-top:8px">Files</div>'+
        list.map(f=>`<div class="gh-file-item">${f.type==='dir'?'📁':'📄'} ${esc(f.name)}</div>`).join('');
      browseBtn.textContent='Browse files';
    }).catch(e => { ghOut(e.message,'err'); browseBtn.textContent='Browse files'; });
  });

  const commitBtn=document.getElementById('ghCommitBtn');
  if (commitBtn) commitBtn.addEventListener('click', async () => {
    const fp=document.getElementById('ghFilePath')?.value.trim();
    const fc=document.getElementById('ghFileContent')?.value;
    const cm=document.getElementById('ghCommitMsg')?.value.trim();
    const br=document.getElementById('ghBranch')?.value.trim()||selectedRepo.default_branch;
    if (!fp||!fc||!cm) { ghOut('Fill in file path, content and commit message.','err'); return; }
    commitBtn.disabled=true;
    try {
      // check if file exists for SHA
      let sha;
      try {
        const existing=await fetch(`/github/repos/${selectedRepo.owner}/${selectedRepo.name}/contents?path=${encodeURIComponent(fp)}`).then(r=>r.json());
        if (existing.sha) sha=existing.sha;
      } catch(_){}
      const res=await fetch(`/github/repos/${selectedRepo.owner}/${selectedRepo.name}/commits`,{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({path:fp,content:fc,message:cm,branch:br,sha})
      }).then(r=>r.json());
      if (res.error) ghOut(res.error,'err');
      else { ghOut('✓ Committed!','ok'); toast('Committed!','ok'); }
    } catch(e) { ghOut(e.message,'err'); }
    commitBtn.disabled=false;
  });

  const prBtn=document.getElementById('ghPrBtn');
  if (prBtn) prBtn.addEventListener('click', async () => {
    const title=document.getElementById('ghPrTitle')?.value.trim();
    const head=document.getElementById('ghPrHead')?.value.trim();
    const body=document.getElementById('ghPrBody')?.value.trim();
    if (!title||!head) { ghOut('Fill in PR title and head branch.','err'); return; }
    prBtn.disabled=true;
    try {
      const res=await fetch(`/github/repos/${selectedRepo.owner}/${selectedRepo.name}/pulls`,{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({title,head,base:selectedRepo.default_branch,body:body||''})
      }).then(r=>r.json());
      if (res.error) ghOut(res.error,'err');
      else { ghOut(`✓ PR #${res.number} created!`,'ok'); toast('PR created!','ok'); }
    } catch(e) { ghOut(e.message,'err'); }
    prBtn.disabled=false;
  });

  const prsBtn=document.getElementById('ghPrsBtn');
  if (prsBtn) prsBtn.addEventListener('click', () => {
    prsBtn.textContent='Loading…';
    fetch(`/github/repos/${selectedRepo.owner}/${selectedRepo.name}/pulls`).then(r=>r.json()).then(prs => {
      const el=document.getElementById('ghPrsList');
      if (!prs.length) { el.innerHTML='<div style="color:var(--muted);font-size:12px">No open PRs</div>'; }
      else el.innerHTML=prs.map(p=>`<div class="pr-item"><div class="pr-title">#${p.number} ${esc(p.title)}</div><div class="pr-meta">${esc(p.user.login)} · ${esc(p.head.ref)} → ${esc(p.base.ref)}</div></div>`).join('');
      prsBtn.textContent='Load PRs';
    }).catch(e => { ghOut(e.message,'err'); prsBtn.textContent='Load PRs'; });
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function scrollBot() {
  if (msgEl.scrollHeight-msgEl.scrollTop-msgEl.clientHeight < 120) msgEl.scrollTop=msgEl.scrollHeight;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function relTime(ms) {
  const d=Date.now()-ms;
  if(d<60000) return 'Just now';
  if(d<3600000) return Math.floor(d/60000)+'m ago';
  if(d<86400000) return Math.floor(d/3600000)+'h ago';
  return Math.floor(d/86400000)+'d ago';
}
function mkActBtn(label) {
  const btn=document.createElement('button'); btn.className='act-btn';
  const ico=document.createElementNS('http://www.w3.org/2000/svg','svg');
  ico.setAttribute('width','11'); ico.setAttribute('height','11');
  ico.setAttribute('viewBox','0 0 24 24'); ico.setAttribute('fill','none');
  ico.setAttribute('stroke','currentColor'); ico.setAttribute('stroke-width','2'); ico.setAttribute('stroke-linecap','round');
  ico.innerHTML='<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>';
  btn.appendChild(ico); btn.appendChild(document.createTextNode(label));
  return btn;
}
