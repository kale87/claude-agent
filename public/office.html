<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kal-AI Office</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#050510;overflow:hidden;font-family:'Courier New',monospace}
#game-container{width:100%;height:calc(100% - 40px - 72px);position:relative;top:40px}
#hud{
  position:fixed;top:0;left:0;right:0;height:40px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:rgba(5,5,16,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(99,102,241,0.4);
  z-index:200;
}
.hud-title{
  font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  background:linear-gradient(90deg,#6366f1,#a78bfa,#10b981);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hud-agents{display:flex;gap:8px;}
.agent-pill{
  display:flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
  font-size:10px;color:rgba(255,255,255,0.5);
  transition:all 0.25s;
  cursor:default;
}
.agent-pill.active{
  background:rgba(var(--cr),0.12);
  border-color:var(--c);
  box-shadow:0 0 16px -4px var(--c);
  color:#fff;
}
.agent-dot{width:5px;height:5px;border-radius:50%;background:var(--c);flex-shrink:0;transition:all 0.25s;}
.agent-pill.active .agent-dot{box-shadow:0 0 6px var(--c);animation:pulse 0.8s ease-in-out infinite alternate;}
@keyframes pulse{to{transform:scale(2);opacity:0.4;}}
.agent-state{font-size:9px;opacity:0.6;font-style:italic;}
.ws-status{display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,0.35);}
.ws-dot{width:4px;height:4px;border-radius:50%;background:#374151;}
.ws-dot.on{background:#4ade80;box-shadow:0 0 6px #4ade80;}
#log{
  position:fixed;bottom:0;left:0;right:0;height:72px;
  background:rgba(5,5,16,0.95);backdrop-filter:blur(12px);
  border-top:1px solid rgba(99,102,241,0.2);
  padding:6px 16px;
  z-index:200;
  overflow:hidden;
}
.log-title{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(99,102,241,0.5);margin-bottom:3px;}
#log-entries{display:flex;flex-direction:column;gap:1px;}
.log-entry{
  font-size:10px;color:rgba(255,255,255,0.45);
  display:flex;gap:8px;
  animation:logIn 0.2s ease;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
@keyframes logIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:none;}}
.log-t{color:rgba(99,102,241,0.4);flex-shrink:0;}
.log-a{font-weight:700;flex-shrink:0;}
</style>
</head>
<body>
<div id="hud">
  <div class="hud-title">&#9724; KAL-AI OFFICE</div>
  <div class="hud-agents" id="agentPills"></div>
  <div class="ws-status">
    <div class="ws-dot" id="wsDot"></div>
    <span id="wsLabel">connecting</span>
  </div>
</div>
<div id="game-container"></div>
<div id="log">
  <div class="log-title">&#9632; SYSTEM LOG</div>
  <div id="log-entries"></div>
</div>
<script>
'use strict';
const AGENTS={
  orchestrator:{name:'Orchestrator',emoji:'\uD83E\uDDE0',color:'#6366f1',hex:0x6366f1,label:'MGR',skin:0xfdbcb4},
  coder:{name:'Coder',emoji:'\uD83D\uDCBB',color:'#10b981',hex:0x10b981,label:'DEV',skin:0xfdc9a0},
  analyst:{name:'Analyst',emoji:'\uD83D\uDD0D',color:'#f59e0b',hex:0xf59e0b,label:'ANL',skin:0xf5d5a0},
};
const agState=Object.fromEntries(Object.keys(AGENTS).map(k=>[k,{status:'idle',msg:''}]));

// HUD pills
const pillsEl=document.getElementById('agentPills');
Object.entries(AGENTS).forEach(([k,a])=>{
  const el=document.createElement('div');
  el.className='agent-pill';
  el.id='pill-'+k;
  el.style.setProperty('--c',a.color);
  el.innerHTML=`<div class="agent-dot"></div><span>${a.emoji} ${a.name}</span><span class="agent-state" id="st-${k}">idle</span>`;
  pillsEl.appendChild(el);
});
function updatePill(agent,status,msg){
  const pill=document.getElementById('pill-'+agent);
  const st=document.getElementById('st-'+agent);
  if(!pill)return;
  pill.classList.toggle('active',status!=='idle');
  if(st)st.textContent=status+(msg?' \u00b7 '+msg.slice(0,18):'');
}

// Log
const logEl=document.getElementById('log-entries');
function addLog(agent,status,msg){
  const a=AGENTS[agent]; if(!a)return;
  const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const e=document.createElement('div');
  e.className='log-entry';
  e.innerHTML=`<span class="log-t">${now}</span><span class="log-a" style="color:${a.color}">${a.label}</span><span>${status}${msg?' \u2014 '+msg:''}</span>`;
  logEl.prepend(e);
  while(logEl.children.length>4)logEl.removeChild(logEl.lastChild);
}

// WebSocket
let ws;
function connectWS(){
  ws=new WebSocket(`ws://${location.host}/ws`);
  ws.onopen=()=>{document.getElementById('wsDot').classList.add('on');document.getElementById('wsLabel').textContent='live';};
  ws.onclose=()=>{document.getElementById('wsDot').classList.remove('on');document.getElementById('wsLabel').textContent='reconnecting';setTimeout(connectWS,2000);};
  ws.onmessage=e=>{
    try{
      const d=JSON.parse(e.data);
      if(d.type==='agent_status'){
        const{agent,status,message}=d;
        agState[agent]={status,msg:message||''};
        updatePill(agent,status,message);
        addLog(agent,status,message);
        if(window.game)window.game.scene.getScene('Office')?.onAgentEvent(agent,status,message);
      }
    }catch(e){}
  };
}
connectWS();

// -----------------------------------------------------------------------
// Phaser Scene
// -----------------------------------------------------------------------
class OfficeScene extends Phaser.Scene{
  constructor(){super({key:'Office'});}
  create(){
    const W=this.scale.width,H=this.scale.height;
    this.W=W;this.H=H;
    this.gFloor=this.add.graphics();
    this.gFurni=this.add.graphics();
    this.gGlow=this.add.graphics();
    this.agents={};
    this.bubbles={};
    this.glowTime=0;
    this.drawAll(W,H);
    this.createAgents(W,H);
    this.scale.on('resize',(_,gS)=>this.onResize(gS.width,gS.height));
  }

  drawAll(W,H){
    this.gFloor.clear();
    this.gFurni.clear();
    const HUD=40,LOG=72;
    const aH=H-HUD-LOG; // available height
    const mid={x:W/2,y:HUD+aH/2};
    // desk positions
    this.desks={
      orchestrator:{x:mid.x,       y:HUD+aH*0.32},
      coder:       {x:W*0.22,      y:HUD+aH*0.68},
      analyst:     {x:W*0.78,      y:HUD+aH*0.68},
    };
    this.drawFloor(W,H,HUD,LOG);
    this.drawDecor(W,H,HUD,aH);
    Object.entries(this.desks).forEach(([k,d])=>{
      const a=AGENTS[k];
      this.drawDesk(this.gFurni,d.x,d.y,a.hex,a.label,agState[k]?.status||'idle');
    });
  }

  drawFloor(W,H,HUD,LOG){
    const g=this.gFloor;
    // Background
    g.fillStyle(0x060612);
    g.fillRect(0,0,W,H);
    // Tile grid
    const TS=40;
    for(let y=HUD;y<H-LOG;y+=TS){
      for(let x=0;x<W;x+=TS){
        const dark=((y/TS|0)+(x/TS|0))%2===0;
        g.fillStyle(dark?0x080818:0x0a0a1e,1);
        g.fillRect(x,y,TS,TS);
      }
    }
    // Grid lines
    g.lineStyle(1,0x12123a,0.4);
    for(let x=0;x<=W;x+=TS){g.beginPath();g.moveTo(x,HUD);g.lineTo(x,H-LOG);g.strokePath();}
    for(let y=HUD;y<=H-LOG;y+=TS){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.strokePath();}
    // Room border
    const m=30;
    g.lineStyle(1,0x6366f1,0.3);
    g.strokeRect(m,HUD+m,W-m*2,H-HUD-LOG-m*2);
    // Corner brackets
    g.lineStyle(2,0x6366f1,0.9);
    const c=16;
    [[m,HUD+m],[W-m,HUD+m],[m,H-LOG-m],[W-m,H-LOG-m]].forEach(([cx,cy])=>{
      g.beginPath();g.moveTo(cx,cy+c);g.lineTo(cx,cy);g.lineTo(cx+c,cy);g.strokePath();
      g.beginPath();g.moveTo(cx,cy-c);g.lineTo(cx,cy);g.lineTo(cx-c,cy);g.strokePath();
    });
  }

  drawDecor(W,H,HUD,aH){
    const g=this.gFurni;
    const btm=HUD+aH;
    // Plants
    [[W*0.08,HUD+aH*0.2],[W*0.92,HUD+aH*0.2],[W*0.08,HUD+aH*0.75],[W*0.92,HUD+aH*0.75]]
      .forEach(([x,y])=>this.drawPlant(g,x,y));
    // Bookshelves top wall
    [[W*0.35,HUD+32],[W*0.65,HUD+32]].forEach(([x,y])=>this.drawShelf(g,x,y));
    // Water cooler
    this.drawCooler(g,W/2,HUD+28);
    // Meeting table center (decorative)
    g.fillStyle(0x12122a);
    g.fillRoundedRect(W/2-45,HUD+aH*0.5-18,90,36,6);
    g.lineStyle(1,0x2a2a5a,0.8);
    g.strokeRoundedRect(W/2-45,HUD+aH*0.5-18,90,36,6);
    // Chairs around table
    [[W/2-55,HUD+aH*0.5],[W/2+55,HUD+aH*0.5],[W/2,HUD+aH*0.5-28],[W/2,HUD+aH*0.5+28]]
      .forEach(([cx,cy])=>{g.fillStyle(0x1a1a35);g.fillCircle(cx,cy,7);});
    // Server rack
    this.drawServerRack(g,W*0.93,HUD+aH*0.45);
  }

  drawDesk(g,x,y,color,label,status){
    const W=100,H=52;
    const isActive=status!=='idle'&&status!=='seated';
    // Shadow
    g.fillStyle(0x000000,0.5);
    g.fillRect(x-W/2+5,y-H/2+5,W,H);
    // Surface
    g.fillStyle(color,isActive?0.2:0.1);
    g.fillRect(x-W/2,y-H/2,W,H);
    // Border
    g.lineStyle(isActive?2:1,color,isActive?1:0.5);
    g.strokeRect(x-W/2,y-H/2,W,H);
    // Top highlight
    g.lineStyle(1,color,0.4);
    g.beginPath();g.moveTo(x-W/2+2,y-H/2+2);g.lineTo(x+W/2-2,y-H/2+2);g.strokePath();
    // Monitor base
    const mW=34,mH=24;
    g.fillStyle(0x06060e);
    g.fillRect(x-mW/2,y-H/2-mH+2,mW,mH);
    g.lineStyle(1,color,0.7);
    g.strokeRect(x-mW/2,y-H/2-mH+2,mW,mH);
    // Monitor screen
    g.fillStyle(color,isActive?0.15:0.04);
    g.fillRect(x-mW/2+2,y-H/2-mH+4,mW-4,mH-4);
    // Monitor stand
    g.fillStyle(0x1a1a2e);
    g.fillRect(x-3,y-H/2+2,6,5);
    g.fillRect(x-7,y-H/2+6,14,2);
    // Keyboard
    g.fillStyle(0x1c1c38);
    g.fillRect(x-22,y+5,44,11);
    g.lineStyle(0.5,color,0.2);
    g.strokeRect(x-22,y+5,44,11);
    // Mug
    g.fillStyle(0x2d1a0a);
    g.fillRect(x+W/2-16,y-5,9,11);
    g.fillStyle(0xb05010,0.5);
    g.fillRect(x+W/2-15,y-4,7,4);
    // Chair
    g.fillStyle(0x181830);
    g.fillRect(x-16,y+H/2+3,32,15);
    g.lineStyle(1,color,0.15);
    g.strokeRect(x-16,y+H/2+3,32,15);
  }

  drawPlant(g,x,y){
    g.fillStyle(0x3d2b1f);g.fillRect(x-9,y-3,18,15);
    g.lineStyle(1,0x5a3d2a,0.7);g.strokeRect(x-9,y-3,18,15);
    g.fillStyle(0x1a4d2e);g.fillCircle(x,y-12,13);
    g.fillStyle(0x1f6035);g.fillCircle(x-7,y-16,9);
    g.fillStyle(0x22703d);g.fillCircle(x+6,y-15,10);
    g.fillStyle(0x28854a);g.fillCircle(x,y-20,7);
  }

  drawShelf(g,x,y){
    const sW=64,sH=44;
    g.fillStyle(0x2d1a0a);g.fillRect(x-sW/2,y,sW,sH);
    g.lineStyle(1,0x5a3d2a,0.5);g.strokeRect(x-sW/2,y,sW,sH);
    g.fillStyle(0x3d2b1f);g.fillRect(x-sW/2,y+sH/2,sW,2);
    const books=[0x6366f1,0x10b981,0xf59e0b,0xec4899,0x3b82f6,0x8b5cf6,0xef4444];
    let bx=x-sW/2+3;
    books.forEach(c=>{
      const bW=Phaser.Math.Between(7,10);
      g.fillStyle(c,0.85);g.fillRect(bx,y+3,bW,sH/2-5);
      bx+=bW+1;
      if(bx>x+sW/2-4)return;
    });
  }

  drawCooler(g,x,y){
    g.fillStyle(0x1a2a4a);g.fillRect(x-11,y,22,35);
    g.lineStyle(1,0x3a5a8a,0.8);g.strokeRect(x-11,y,22,35);
    g.fillStyle(0x60a5fa,0.35);g.fillRect(x-7,y-12,14,14);
    g.lineStyle(1,0x93c5fd,0.5);g.strokeRect(x-7,y-12,14,14);
    g.fillStyle(0x6366f1);g.fillRect(x-5,y+12,10,5);
  }

  drawServerRack(g,x,y){
    g.fillStyle(0x0a1020);g.fillRect(x-16,y-40,32,80);
    g.lineStyle(1,0x1e3a5a,0.9);g.strokeRect(x-16,y-40,32,80);
    for(let i=0;i<5;i++){
      g.fillStyle(i%2===0?0x0d1f38:0x091428);
      g.fillRect(x-13,y-35+i*14,26,12);
      g.fillStyle(i<2?0x4ade80:0x6366f1,0.7);
      g.fillCircle(x+8,y-29+i*14,2);
    }
  }

  // Characters
  createAgents(W,H){
    Object.entries(AGENTS).forEach(([key,a])=>{
      const desk=this.desks[key];
      const sx=W/2+Phaser.Math.Between(-40,40);
      const sy=H/2+Phaser.Math.Between(-20,20);
      const c=this.add.container(sx,sy);
      const sprite=this.add.graphics();
      c.add(sprite);
      // Name label
      const tag=this.add.text(0,-32,a.label,{
        fontSize:'9px',fontFamily:'Courier New',
        color:a.color,backgroundColor:'rgba(5,5,16,0.92)',
        padding:{x:4,y:1},
      }).setOrigin(0.5);
      c.add(tag);
      // Status dot
      const dot=this.add.graphics();
      dot.fillStyle(a.hex,1);dot.fillCircle(10,-20,3);
      c.add(dot);
      this.agents[key]={container:c,sprite,tag,dot,color:a.hex,skin:a.skin,
        status:'idle',frame:0,frameTimer:0,walkTimer:0,tween:null,deskX:desk.x,deskY:desk.y};
      this.time.delayedCall(Phaser.Math.Between(200,900),()=>this.walkToDesk(key));
    });
  }

  drawChar(g,color,skin,status,frame){
    g.clear();
    const bob=(status==='idle'||status==='seated')?0:Math.sin(frame*0.28)*1.5;
    const typing=status==='coding'||status==='working';
    const thinking=status==='thinking'||status==='synthesizing';
    const walking=status==='walking';
    // Shadow
    g.fillStyle(0x000000,0.25);g.fillEllipse(0,18,20,6);
    // Body
    g.fillStyle(color,1);g.fillRect(-7,-2+bob,14,13);
    // Collar
    g.fillStyle(0xffffff,0.15);g.fillRect(-3,-2+bob,6,3);
    // Head
    g.fillStyle(skin);g.fillRect(-6,-16+bob,12,12);
    // Hair
    g.fillStyle(color,0.9);g.fillRect(-6,-16+bob,12,4);
    // Eyes
    g.fillStyle(0x111111);
    if(thinking){
      g.fillRect(-3,-9+bob,3,1);g.fillRect(1,-9+bob,3,1);
    }else{
      g.fillRect(-3,-9+bob,3,2);g.fillRect(1,-9+bob,3,2);
    }
    // Glasses (analyst has yellow = 0xf59e0b)
    if(color===0xf59e0b){
      g.lineStyle(1,0x999999,0.9);
      g.strokeRect(-4,-10+bob,4,3);g.strokeRect(1,-10+bob,4,3);
      g.beginPath();g.moveTo(0,-8+bob);g.lineTo(1,-8+bob);g.strokePath();
    }
    // Arms
    if(typing){
      const av=Math.sin(frame*0.5)*2;
      g.fillStyle(skin);g.fillRect(-11,1+bob+av,5,7);g.fillRect(6,1+bob-av,5,7);
    }else if(walking){
      const av=Math.sin(frame*0.45)*4;
      g.fillStyle(skin);g.fillRect(-11,0+bob,5,7+av);g.fillRect(6,0+bob,5,7-av);
    }else{
      g.fillStyle(skin);g.fillRect(-11,0+bob,5,9);g.fillRect(6,0+bob,5,9);
    }
    // Legs
    const ls=walking?Math.sin(frame*0.45)*4:0;
    g.fillStyle(0x181830);
    g.fillRect(-5,11+bob,5,9+ls);g.fillRect(1,11+bob,5,9-ls);
    // Shoes
    g.fillStyle(color,0.5);
    g.fillRect(-6,19+bob,6,3);g.fillRect(1,19+bob,6,3);
    // Laptop when coding
    if(typing){
      g.fillStyle(0x06060e);g.fillRect(-10,5+bob,20,12);
      g.lineStyle(1,color,0.9);g.strokeRect(-10,5+bob,20,12);
      g.fillStyle(color,0.25);
      const lw=(frame%14)+1;
      g.fillRect(-8,7+bob,lw,1);g.fillRect(-8,9+bob,Math.max(lw-4,1),1);g.fillRect(-8,11+bob,lw-2,1);
    }
    // Thought bubble
    if(thinking){
      g.fillStyle(0xffffff,0.85);
      g.fillCircle(14,-20+bob,4);g.fillCircle(17,-25+bob,2.5);g.fillCircle(19,-29+bob,1.5);
    }
  }

  walkToDesk(key){
    const ag=this.agents[key]; if(!ag)return;
    const tx=ag.deskX,ty=ag.deskY-35;
    if(ag.tween)ag.tween.stop();
    const dist=Phaser.Math.Distance.Between(ag.container.x,ag.container.y,tx,ty);
    ag.status='walking';
    ag.tween=this.tweens.add({
      targets:ag.container,x:tx,y:ty,
      duration:Math.max(600,dist*3.5),ease:'Sine.easeInOut',
      onComplete:()=>{ag.status='seated';}
    });
  }

  showBubble(key,text){
    if(this.bubbles[key]){this.bubbles[key].destroy();delete this.bubbles[key];}
    const ag=this.agents[key]; if(!ag)return;
    const {container,color}=ag;
    const maxLen=32;
    const display=text.length>maxLen?text.slice(0,maxLen)+'\u2026':text;
    const bW=Math.max(70,display.length*5.2+20),bH=24;
    const bub=this.add.container(container.x,container.y-48);
    const bg=this.add.graphics();
    bg.fillStyle(0x050510,0.97);
    bg.fillRoundedRect(-bW/2,-bH/2,bW,bH,7);
    bg.lineStyle(1.5,color,1);
    bg.strokeRoundedRect(-bW/2,-bH/2,bW,bH,7);
    bg.fillStyle(0x050510,0.97);
    bg.fillTriangle(-5,bH/2,5,bH/2,0,bH/2+7);
    bg.lineStyle(1,color,0.7);
    bg.beginPath();bg.moveTo(-5,bH/2);bg.lineTo(0,bH/2+7);bg.lineTo(5,bH/2);bg.strokePath();
    const lbl=this.add.text(0,0,display,{
      fontSize:'8px',fontFamily:'Courier New',color:'#ffffff',align:'center',
    }).setOrigin(0.5);
    bub.add([bg,lbl]);
    this.bubbles[key]=bub;
    this.time.delayedCall(4500,()=>{
      if(this.bubbles[key]===bub){
        this.tweens.add({targets:bub,alpha:0,duration:400,onComplete:()=>bub.destroy()});
        delete this.bubbles[key];
      }
    });
  }

  onAgentEvent(key,status,msg){
    const ag=this.agents[key]; if(!ag)return;
    ag.status=status;
    if(msg&&status!=='idle'&&status!=='done')this.showBubble(key,msg);
    if(status==='done')this.showBubble(key,'\u2713 Done!');
    if(['working','coding','searching','walking'].includes(status))this.walkToDesk(key);
    // Redraw desk glow
    this.drawAll(this.W,this.H);
    if(this.agents)Object.entries(this.agents).forEach(([k,a])=>{a.deskX=this.desks[k].x;a.deskY=this.desks[k].y;});
  }

  update(_t,delta){
    const dt=delta/1000;
    this.glowTime+=dt;
    Object.entries(this.agents).forEach(([key,ag])=>{
      ag.frameTimer+=dt*60;
      if(ag.frameTimer>5){ag.frame++;ag.frameTimer=0;}
      this.drawChar(ag.sprite,ag.color,ag.skin,ag.status,ag.frame);
      if(this.bubbles[key]){
        this.bubbles[key].x=ag.container.x;
        this.bubbles[key].y=ag.container.y-50;
      }
      // Idle stretch
      if((ag.status==='seated'||ag.status==='idle')&&!ag.tween?.isPlaying()){
        ag.walkTimer+=dt;
        if(ag.walkTimer>10+Math.random()*5){
          ag.walkTimer=0;
          const oy=ag.container.y;
          this.tweens.add({targets:ag.container,y:oy-6,duration:300,yoyo:true,ease:'Sine.easeInOut'});
        }
      }
    });
    // Animate active monitor screens
    const g=this.gGlow;
    g.clear();
    Object.entries(this.agents).forEach(([key,ag])=>{
      if(ag.status==='coding'||ag.status==='working'){
        const desk=this.desks[key];
        const flicker=Math.sin(this.glowTime*8+key.length)*0.5+0.5;
        g.fillStyle(ag.color,0.06+flicker*0.08);
        const mW=34,mH=24;
        g.fillRect(desk.x-mW/2+2,desk.y-52/2-mH+4,mW-4,mH-4);
        // Desk area glow
        g.fillStyle(ag.color,0.03+flicker*0.04);
        g.fillRect(desk.x-55,desk.y-35,110,70);
      }
    });
  }

  onResize(W,H){
    this.W=W;this.H=H;
    this.drawAll(W,H);
    Object.entries(this.agents).forEach(([k,ag])=>{
      ag.deskX=this.desks[k].x;ag.deskY=this.desks[k].y;
      this.walkToDesk(k);
    });
  }
}

const cfg={
  type:Phaser.AUTO,parent:'game-container',
  width:window.innerWidth,height:window.innerHeight-40-72,
  backgroundColor:'#050510',
  scene:OfficeScene,
  scale:{mode:Phaser.Scale.RESIZE,autoCenter:Phaser.Scale.CENTER_BOTH},
  render:{pixelArt:true,antialias:false,roundPixels:true},
};
window.game=new Phaser.Game(cfg);
window.addEventListener('resize',()=>window.game.scale.resize(window.innerWidth,window.innerHeight-40-72));
</script>
